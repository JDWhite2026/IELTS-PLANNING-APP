<script>
    /* ================================================================
       LEARN EXAMPLE - one fully worked prompt used across all chapters
       ================================================================ */
    const LEARN_P = {
        topic: 'Education',
        prompt: "Some people believe universities should focus on teaching practical job skills, while others think they should prioritise pure theoretical research. Discuss both views and give your opinion.",
        scope: { before: "Should ", correctToken: "universities", mid: " focus on practical job skills, or should they prioritise ", wrongToken: "theoretical research", after: "?" },
        demo: { s1: "Job training", joiner: "is", key: "vital", verb: "because it makes", s2: "graduates", loopWords: "useful and highly capable" },
        loopTrap: "Practical job training helps students learn practical, job-ready skills for the workplace.",
        halfLoop: "Practical job training is valuable because most students find it a very valuable part of their studies.",
        bridgeFull: "Practical job skills training at university is valuable because it directly reduces graduate unemployment by aligning coursework with the skills employers explicitly require.",
        position: "Universities should prioritise practical job training.",
        whyRight: "Because employers increasingly value job-ready graduates over those with purely theoretical knowledge.",
        whyWrong: "Because practical training is a very important and useful thing for university students.",
        howRight: "Computing graduates with hands-on coding experience are hired faster than those with only abstract theory.",
        howWrong: "Many people agree that practical training is useful for getting jobs.",
        sentences: {
            idea: "Universities should prioritise practical job training because it directly serves graduates' career outcomes.",
            reason: "This is because employers increasingly value job-ready graduates over those with purely theoretical knowledge.",
            example: "For instance, computing graduates with hands-on coding experience are hired faster than those with only abstract theory."
        },
        notes: {
            boundary: "Boundary: universities",
            p1: "P1: job skills → careers / employers want job-ready grads / eg CS grads hired faster",
            p2: "P2: theory → progress / core principles → applied later / eg computing ← maths logic",
            thesis: "Thesis: while job skills…, theory = more value",
            concl: "Concl: restate stance + best reason"
        },
        p2notes: { idea: "P2: theory → long-term progress", reason: "core principles → applied fields later", example: "eg computing langs ← abstract maths" },
        sideA: "practical job training", sideB: "theoretical research",
        thesisSentence: "While some argue that universities should prioritise practical job training, I believe that theoretical research delivers greater long-term societal value."
    };

    /* ================================================================
       PRACTICE BANK - fresh prompts, never used in Learn
       ================================================================ */
    const PRACTICE_BANK = [
        { id: 'env', topic: 'Environment',
          prompt: "Some people think environmental protection should be the government's responsibility, while others believe individuals should take action themselves. Discuss both views and give your opinion.",
          boundary: "governments",
          pillarA: { label: "government responsibility", keywords: ['government','regulation','law','policy','state','legislat'] },
          pillarB: { label: "individual action", keywords: ['individual','citizen','personal','lifestyle','choice','people themselves'] },
          loopTrap: "Government regulation regulates industries to make sure the environment is well-regulated.",
          model: { boundary: "Boundary: governments", p1: "P1: govt regs → scale / binding laws = all industries / eg carbon caps > campaigns", p2: "P2: individual action counts / millions of choices → pressure on companies / eg plant-based shift", thesis: "Thesis: while govt regs…, individual change = lasting", concl: "Concl: restate stance + best reason" } },
        { id: 'tech', topic: 'Technology',
          prompt: "Some people believe online learning will eventually replace traditional classroom education, while others think traditional classrooms remain essential. Discuss both views and give your opinion.",
          boundary: "education",
          pillarA: { label: "online learning", keywords: ['online','remote','platform','digital','distance'] },
          pillarB: { label: "traditional classrooms", keywords: ['classroom','face-to-face','in-person','traditional','physical'] },
          loopTrap: "Online learning lets students learn online in a flexible, online format.",
          model: { boundary: "Boundary: education (all levels)", p1: "P1: online removes distance / no relocation needed / eg rural students → degrees", p2: "P2: classrooms essential / face-to-face → communication / eg employers rate in-person grads ↑", thesis: "Thesis: while online grows…, face-to-face = essential", concl: "Concl: restate stance + best reason" } },
        { id: 'crime', topic: 'Crime',
          prompt: "Some people think that stricter punishments are the most effective way to reduce crime, while others believe addressing the root causes of crime is more effective. Discuss both views and give your opinion.",
          boundary: "crime",
          pillarA: { label: "stricter punishment", keywords: ['punish','sentence','prison','deterr','strict'] },
          pillarB: { label: "root causes", keywords: ['root cause','poverty','inequality','prevention','education','unemployment'] },
          loopTrap: "Stricter punishment punishes offenders with stricter, harsher punishments for their crimes.",
          model: { boundary: "Boundary: reducing crime (policy)", p1: "P1: harsh sentences deter / high cost → think twice / eg mandatory minimums → reoffending ↓", p2: "P2: root causes > punishment / poverty ↔ crime / eg youth job schemes → crime ↓ more", thesis: "Thesis: while punishment…, root causes = safer long-run", concl: "Concl: restate stance + best reason" } },
        { id: 'health', topic: 'Health',
          prompt: "Some people think governments should be responsible for public health, while others believe individuals should take care of their own health. Discuss both views and give your opinion.",
          boundary: "governments",
          pillarA: { label: "government responsibility", keywords: ['government','public health','policy','state','healthcare system','tax'] },
          pillarB: { label: "personal responsibility", keywords: ['individual','personal','own health','lifestyle','diet','exercise'] },
          loopTrap: "Government healthcare keeps people healthy by providing health services for their health.",
          model: { boundary: "Boundary: governments", p1: "P1: govts shape health / regulation + access / eg sugar taxes → obesity ↓", p2: "P2: habits are personal / daily choices decide outcomes / eg exercise + diet → chronic disease ↓", thesis: "Thesis: while individuals choose…, govt policy = bigger effect", concl: "Concl: restate stance + best reason" } },
        { id: 'work', topic: 'Work',
          prompt: "Some people believe employees work more effectively from home, while others think the workplace is essential for productivity and teamwork. Discuss both views and give your opinion.",
          boundary: "employees",
          pillarA: { label: "working from home", keywords: ['home','remote','flexib','commute'] },
          pillarB: { label: "the workplace", keywords: ['office','workplace','team','in-person','colleague'] },
          loopTrap: "Working from home makes employees more productive because they can produce more work at home.",
          model: { boundary: "Boundary: employees", p1: "P1: home = focus / no commute + fewer interruptions / eg deep-work tasks done faster", p2: "P2: office = collaboration / spontaneous discussion → ideas / eg juniors learn by watching seniors", thesis: "Thesis: while home suits focus…, office = essential for teams", concl: "Concl: restate stance + best reason" } },
        { id: 'media', topic: 'Media & Childhood',
          prompt: "Some people think children should not be allowed to use social media, while others believe it is an important part of modern childhood. Discuss both views and give your opinion.",
          boundary: "children",
          pillarA: { label: "restricting access", keywords: ['ban','restrict','limit','protect','harm','not allowed'] },
          pillarB: { label: "part of modern childhood", keywords: ['modern','skill','connect','digital literacy','friend','learn'] },
          loopTrap: "Banning social media protects children by keeping them safe from social media.",
          model: { boundary: "Boundary: children", p1: "P1: restriction protects / young brains + constant comparing / eg screen limits → sleep + mood ↑", p2: "P2: social media = modern life / digital skills + connection / eg distant family + shared interests", thesis: "Thesis: while risks are real…, guided use > total ban", concl: "Concl: restate stance + best reason" } },
        { id: 'arts', topic: 'Arts & Public Money',
          prompt: "Some people think governments should spend money supporting the arts, while others believe that money should go to public services instead. Discuss both views and give your opinion.",
          boundary: "governments",
          pillarA: { label: "funding the arts", keywords: ['art','culture','museum','music','creative','heritage'] },
          pillarB: { label: "public services", keywords: ['public service','hospital','school','infrastructure','health','housing'] },
          loopTrap: "Funding the arts supports artists by giving financial support to the arts.",
          model: { boundary: "Boundary: governments", p1: "P1: arts = identity + economy / culture attracts tourism / eg galleries → city visitors ↑", p2: "P2: services first / health + education = basic needs / eg hospital waiting lists vs opera subsidy", thesis: "Thesis: while arts matter…, essential services = priority", concl: "Concl: restate stance + best reason" } },
        { id: 'transport', topic: 'Cities & Transport',
          prompt: "Some people think the best way to reduce traffic in cities is to raise the cost of driving, while others believe better public transport is the answer. Discuss both views and give your opinion.",
          boundary: "cities",
          pillarA: { label: "raising driving costs", keywords: ['tax','charge','cost','fee','congestion','price'] },
          pillarB: { label: "better public transport", keywords: ['public transport','bus','train','metro','invest','alternative'] },
          loopTrap: "Raising the cost of driving reduces traffic because expensive driving means driving costs more.",
          model: { boundary: "Boundary: cities", p1: "P1: price changes behaviour / driving cost ↑ → trips ↓ / eg congestion charges → traffic ↓ 20%+", p2: "P2: alternatives needed first / no option = unfair tax / eg reliable metro → drivers switch", thesis: "Thesis: while pricing works…, transport investment = fairer fix", concl: "Concl: restate stance + best reason" } },
        { id: 'sport', topic: 'Children & Sport',
          prompt: "Some people believe competitive sport teaches children valuable life skills, while others think it places too much pressure on them. Discuss both views and give your opinion.",
          boundary: "children",
          pillarA: { label: "valuable life skills", keywords: ['skill','teamwork','discipline','resilience','learn','confidence'] },
          pillarB: { label: "too much pressure", keywords: ['pressure','stress','anxiety','fear','burnout','fail'] },
          loopTrap: "Competitive sport teaches children to compete by making them more competitive.",
          model: { boundary: "Boundary: children", p1: "P1: sport builds skills / losing → resilience, teams → cooperation / eg captains → leadership later", p2: "P2: pressure harms / adult expectations on kids / eg early dropout when fun → fear", thesis: "Thesis: while pressure is a risk…, well-run sport = lasting skills", concl: "Concl: restate stance + best reason" } },
        { id: 'retire', topic: 'Work & Age',
          prompt: "Some people think companies should encourage older employees to retire in order to create opportunities for younger workers, while others believe experienced staff are too valuable to lose. Discuss both views and give your opinion.",
          boundary: "companies",
          pillarA: { label: "encouraging retirement", keywords: ['retire','young','opportunit','fresh','new ideas','promotion'] },
          pillarB: { label: "keeping experience", keywords: ['experience','knowledge','mentor','skill','valuable','train'] },
          loopTrap: "Encouraging retirement helps younger workers because young people get jobs when older people retire.",
          model: { boundary: "Boundary: companies", p1: "P1: staff change → opportunity / blocked promotions → talent leaves / eg grads choose firms with clear paths", p2: "P2: experience = memory / experienced staff prevent repeated mistakes / eg mentoring cuts training costs", thesis: "Thesis: while new openings matter…, losing experience = costly", concl: "Concl: restate stance + best reason" } }
    ];

    // Default type metadata for the discussion prompts above
    PRACTICE_BANK.forEach(p => {
        p.qtype = 'Discussion';
        p.chk4 = 'A thesis naming both sides + your stance';
        p.thesisWords = ['while', 'although', 'whereas', 'however'];
    });

    // One practice prompt for each remaining question type
    PRACTICE_BANK.push(
        { id: 'op-unifree', topic: 'Education', qtype: 'Opinion',
          prompt: "Some people believe that all university education should be free for every student. To what extent do you agree or disagree?",
          boundary: "university",
          pillarA: { label: "reasons to agree", keywords: ['free','access','equal','opportunit','talent','afford'] },
          pillarB: { label: "the other view / second reason", keywords: ['cost','tax','fund','quality','concession','however','value'] },
          loopTrap: "Free university education is good because students can study at university without paying.",
          chk4: 'A clear opinion line (agree / disagree + how far)',
          thesisWords: ['agree', 'disagree', 'while', 'although', 'partly', 'strongly'],
          model: { boundary: "Boundary: university (not all education)", p1: "P1: free uni → equal access / talent not wealth decides / eg low-income enrolment ↑ where free", p2: "P2: accept cost / taxes ↑ + overcrowded courses / but targeted grants fix this", thesis: "Opinion: strongly agree - access > cost", concl: "Concl: restate opinion" } },

    function notePad(items) {
        let html = '<div class="note-pad">';
        items.forEach(it => { html += `<span class="note-tag">${it.ico ? ico(it.ico) : ''}${it.tag}</span><div class="note-line${it.cls ? ' ' + it.cls : ''}">${it.text}</div>`; });
        return html + '</div>';
    }
    const MODEL_LINES = [
        { ico: 'target', tag: 'Boundary', text: LEARN_P.notes.boundary },
        { ico: 'layers', tag: 'Paragraph 1', text: LEARN_P.notes.p1 },
        { ico: 'layers', tag: 'Paragraph 2', text: LEARN_P.notes.p2 },
        { ico: 'compass', tag: 'Thesis', text: LEARN_P.notes.thesis },
        { ico: 'check', tag: 'Conclusion', text: LEARN_P.notes.concl }
    ];
    function modelCard(unlocked, newIdx) {
        const items = MODEL_LINES.map((l, i) => ({
            ico: l.ico,
            tag: l.tag,
            text: i < unlocked ? l.text : '· · ·',
            cls: i >= unlocked ? 'line-locked' : (i === newIdx ? 'line-new' : '')
        }));
        return notePad(items);
    }

    function pauseBtn(btn, ms, label) {
        btn.setAttribute('disabled', 'true');
        setTimeout(() => { btn.removeAttribute('disabled'); btn.innerText = label || 'Continue'; }, Math.min(ms, 800));
    }
    function gateBtn(btn, label) { btn.setAttribute('disabled', 'true'); btn.innerText = label || 'Answer to continue'; }
    function openBtn(label) {
        const btn = el('masterContinueActionBtn');
        btn.removeAttribute('disabled');
        btn.innerText = label || 'Continue';
    }

    function focusReveal(board, btn, beats, opts) {
        const finalLabel = (opts && opts.label) || 'Continue';
        board.innerHTML = '<div id="revealStack"></div>';
        const stack = el('revealStack');
        let i = 0;
        function showNext() {
            if (i > 0 && stack.lastElementChild) stack.lastElementChild.classList.add('beat-rest');
            const div = document.createElement('div');
            div.className = 'focus-beat';
            div.innerHTML = beats[i];
            stack.appendChild(div);
            i++;
            if (i < beats.length) {
                btn.innerText = 'Next point ▸  (' + i + '/' + beats.length + ')';
                btn.onclick = showNext;
            } else {
                btn.innerText = finalLabel;
                btn.onclick = advance;
            }
            btn.removeAttribute('disabled');
        }
        showNext();
    }

    window.tapAnswer = function (node, isCorrect) {
        const instr = document.querySelector('.tap-instruction');
        if (isCorrect) {
            node.classList.remove('tap-wrong');
            node.classList.add('tap-right');
            spawnSuccessRing(node);
            document.querySelectorAll('.tap-card:not(.tap-right), .tap-token:not(.tap-right)').forEach(n => { if (n !== node) n.classList.add('tap-dim'); });
            if (instr) { instr.innerText = "✓ Correct!"; instr.style.animation = 'none'; instr.style.color = 'var(--color-success)'; }
            document.querySelectorAll('.reveal-after').forEach(n => n.classList.add('shown'));
            openBtn();
        } else {
            node.classList.add('tap-wrong');
            setTimeout(() => node.classList.remove('tap-wrong'), 500);
            const hint = node.dataset ? node.dataset.hint : '';
            if (instr && hint) {
                if (!instr.dataset.original) instr.dataset.original = instr.innerText;
                instr.innerText = "✗ " + hint;
                instr.style.animation = 'none';
                instr.style.color = 'var(--color-error)';
                clearTimeout(instr._hintTimer);
                instr._hintTimer = setTimeout(() => { instr.innerText = instr.dataset.original; instr.style.animation = ''; instr.style.color = ''; }, 2400);
            }
        }
    };

    function compressStep(board, btn, sentence, iconName, noteTag, noteText) {
        board.innerHTML = `

        btn.removeAttribute('disabled');

            el('compressResult').innerHTML = `<div class="compress-arrow">▼</div>${notePad([{ ico: iconName, tag: noteTag, text: noteText }])}`;
            btn.setAttribute('disabled', 'true');
            setTimeout(() => { btn.removeAttribute('disabled'); btn.innerText = 'Continue'; btn.onclick = advance; }, 900);
        };
    }

    /* ---------- Drill engine: short rounds of genuine exam examples ---------- */
    function drillStep(board, btn, rounds, doneText) {
        let r = 0;
        gateBtn(btn, 'Complete the drill');
        function renderRound() {
            const round = rounds[r];
            board.innerHTML = `
                <div class="drill-progress">${rounds.map((_, i) => `<i class="${i < r ? 'done' : (i === r ? 'cur' : '')}"></i>`).join('')}</div>
                <div class="tap-instruction">${round.instruction}</div>
                ${round.html}`;
        }
        window.drillTap = function (node, isCorrect) {
            const instr = document.querySelector('.tap-instruction');
            if (isCorrect) {
                node.classList.add('tap-right');
                spawnSuccessRing(node);
                document.querySelectorAll('.tap-card:not(.tap-right), .tap-token:not(.tap-right)').forEach(n => { if (n !== node) n.classList.add('tap-dim'); });
                if (instr) { instr.innerText = '✓'; instr.style.animation = 'none'; instr.style.color = 'var(--color-success)'; }
                setTimeout(() => {
                    r++;
                    if (r < rounds.length) renderRound();
                    else {
                        board.innerHTML = `
                            <div class="drill-progress">${rounds.map(() => `<i class="done"></i>`).join('')}</div>
                            <div class="drill-banner">✓ Drill complete - ${doneText || 'skill locked in'}</div>`;
                        fireConfetti(8);
                        openBtn();
                    }
                }, 750);
            } else {
                node.classList.add('tap-wrong');
                setTimeout(() => node.classList.remove('tap-wrong'), 500);
                const hint = node.dataset ? node.dataset.hint : '';
                if (instr && hint) {
                    if (!instr.dataset.original) instr.dataset.original = instr.innerText;
                    instr.innerText = '✗ ' + hint;
                    instr.style.animation = 'none';
                    instr.style.color = 'var(--color-error)';
                    clearTimeout(instr._hintTimer);
                    instr._hintTimer = setTimeout(() => { instr.innerText = instr.dataset.original; instr.style.animation = ''; instr.style.color = ''; }, 2400);
                }
            }
        };
        renderRound();
    }
    function dCard(text, correct, hint, delay) {
        return `<div class="tap-card" style="animation-delay:${delay || 0}s"${hint ? ` data-hint="${hint}"` : ''} onclick="drillTap(this, ${correct})">${text}</div>`;
    }
    function dTok(text, correct, hint) {
        return `<span class="text-word-token tap-token"${hint ? ` data-hint="${hint}"` : ''} onclick="drillTap(this, ${correct})">${text}</span>`;

    /* ================================================================
       LEARN NAVIGATION - chapter map hub
       ================================================================ */
    const CH_META = [
        { desc: 'Why half your mark is decided before you write', min: 3 },
        { desc: 'Find the boundary word - and dodge the decoy', min: 4 },
        { desc: 'The two-question test that catches empty reasons', min: 4 },
        { desc: 'Generate and compress a full paragraph', min: 5 },
        { desc: 'Both sides, your stance, and the conclusion line', min: 4 },
        { desc: 'Turn the plan into an introduction', min: 4 }
    ];

    /* Each chapter opens with: the goal (in the header), a "what this does for your
       writing" box, and the learning aims. The goal sentence lives only in the
       header subtitle - it is not repeated in the body. */
    const CH_INTRO = [
        { purpose: 'You see how a good plan wins marks - and why seven minutes is the best investment in the whole exam.', mark: 'Task Response + Coherence',
          points: ['explain why half your score is won before you write', 'name what really keeps essays stuck at 6.5', 'walk through the whole five-move plan'] },
        { purpose: 'You understand exactly what the question is asking - so every idea you write actually counts.', mark: 'Task Response',
          points: ['find the boundary - who or what the essay is about', 'spot the decoy word that only looks important', 'decode any exam question quickly'] },
        { purpose: 'You build fewer, stronger arguments that go deeper - instead of piling on shallow ideas.', mark: 'Task Response + Coherence',
          points: ['hear a "loop" - a reason going in a circle', 'run one quick two-question test on any reason', 'turn weak loops into reasons that add something real'] },
        { purpose: 'You turn one idea into a full, well-ordered paragraph the examiner can follow easily.', mark: 'Coherence',
          points: ['build a paragraph in three layers: idea → reason → example', 'pull out ideas when your mind goes blank', 'use P1 and P2 - the short names for your two body paragraphs'] },
        { purpose: 'You make your opinion impossible to miss, from the first paragraph to the last.', mark: 'Task Response',
          points: ['name both sides in one thesis line', 'take a side the reader can\'t miss', 'finish with a conclusion that adds nothing new'] },
        { purpose: 'You write a two-sentence opening: the question in your own words (proving you understood it) and your position (so your side is clear from the first line).', mark: 'Task Response + Coherence',
          points: ['restate the question in your own words, not copied', 'state your position so your side is clear from line one', 'earn a bonus vocabulary mark with your fresh wording'] }
    ];
    function makeIntroStep(i) {
        const it = CH_INTRO[i] || { purpose: '', mark: '', points: [] };
        return {
            title: NAV[i].name.replace(/\?$/, ''), sub: '', wm: NAV[i].num, isIntro: true,
            render(b, btn) {
                b.innerHTML = `
                    <div class="chapter-intro">
                        <div class="ci-mark">
                            <span class="ci-mark-tag">${ico('target')} What this does for your writing</span>
                            <p class="ci-purpose">${it.purpose}</p>
                            <span class="ci-mark-pill">Builds your ${it.mark} mark</span>
                        </div>
                        <span class="ci-label">By the end you'll be able to</span>
                        <ul class="ci-list">${it.points.map(p => `<li>${ico('check')}<span>${p}</span></li>`).join('')}</ul>
                    </div>`;
                btn.removeAttribute('disabled');
                btn.innerText = "Let's go ▸";
            }
        };
    }
    function renderChapterMap() {
        if (mode === 'practise') pauseTimer();
        mode = 'learn';
        try { localStorage.setItem('examacademy_lastsection', 'learn'); } catch (e) {}
        chIdx = -1;
        renderNav();
        setClockVisible(false);
        el('footerBackBtn').style.display = 'none';
        el('globalPromptBoxNode').style.display = 'none';
        el('headerWatermark').innerText = '☰';
        el('appStepBadge').innerText = 'Learn the method';
        el('appStepTitle').innerText = 'Six small chapters';
        el('appStepSubtitle').innerText = 'Each one is a few minutes with its own drill. Do them in order the first time - return to any of them whenever you need.';
        restartAnimation(el('stageHeaderBlock'));

        const board = el('visualDisplayBoard');
        board.innerHTML = CHAPTERS.map((c, i) => {
            const seen = chapterSeen[i], total = c.steps.length;
            const complete = seen >= total, started = seen > 0 && !complete;
            const status = complete ? '✓ Done' : (started ? seen + ' / ' + total : '~' + CH_META[i].min + ' min');
            return `<div class="map-card ${complete ? 'complete' : (started ? 'started' : '')}" style="animation-delay:${i * 0.07}s" onclick="jumpToChapter(${i})">
                <span class="mc-num">${complete ? '✓' : NAV[i].num}</span>
                <span class="mc-body"><span class="mc-name">${NAV[i].name}</span><span class="mc-desc">${CH_META[i].desc}</span></span>
                <span class="mc-status">${status}</span>
            </div>`;
        }).join('');
        playEntrance(board);

        const nextIdx = CHAPTERS.findIndex((c, i) => chapterSeen[i] < c.steps.length);
        const btn = el('masterContinueActionBtn');
        btn.removeAttribute('disabled');
        if (nextIdx === -1) {
            btn.innerText = 'All chapters done - Practise ▶';
            btn.onclick = enterPractise;
        } else {
            btn.innerText = (chapterSeen[nextIdx] > 0 ? 'Resume ' : 'Start ') + NAV[nextIdx].num + ' · ' + NAV[nextIdx].name;
            btn.onclick = () => jumpToChapter(nextIdx);
        }
    }
    function jumpToChapter(i) {
        if (mode === 'practise') pauseTimer();
        showChrome(true);
        mode = 'learn';
        chIdx = i;
        const total = CHAPTERS[i].steps.length;
        // Completed chapter → review from the beginning; otherwise resume where they left off
        stIdx = chapterSeen[i] >= total ? 0 : Math.min(chapterSeen[i], total - 1);
        loadLearnStep();
    }
    function goHome() {
        if (mode === 'practise') pauseTimer();
        renderChapterMap();
    }
    function goBack() {
        if (mode !== 'learn' || chIdx < 0) return;
        if (stIdx > 0) { stIdx--; loadLearnStep(); }
        else { renderChapterMap(); }
    }
    function advance() {
        if (mode !== 'learn' || chIdx < 0) return;
        const steps = CHAPTERS[chIdx].steps;
        if (stIdx < steps.length - 1) {
            stIdx++;
            chapterSeen[chIdx] = Math.max(chapterSeen[chIdx], stIdx);
            loadLearnStep();
        } else {
            chapterSeen[chIdx] = steps.length;
            saveProgress();
            showToast(`${NAV[chIdx].num} ${NAV[chIdx].name} complete ✓`);
            fireConfetti(10);
            // Flow straight into the next chapter's objective screen, no detour to the contents.
            if (chIdx < CHAPTERS.length - 1) jumpToChapter(chIdx + 1);
            else enterPractise();
        }
    }

    function loadLearnStep() {
        mode = 'learn';
        chapterSeen[chIdx] = Math.max(chapterSeen[chIdx], stIdx);
        saveProgress();
        const step = CHAPTERS[chIdx].steps[stIdx];
        renderNav();
        setClockVisible(false);
        el('headerWatermark').innerText = step.wm || NAV[chIdx].num;
        el('appStepBadge').innerText = NAV[chIdx].num + " · " + NAV[chIdx].name + "  -  " + (stIdx + 1) + " / " + CHAPTERS[chIdx].steps.length;
        el('appStepTitle').innerText = step.title;
        el('appStepSubtitle').innerText = step.sub || '';
        el('appStepSubtitle').style.display = step.sub ? '' : 'none';
        restartAnimation(el('stageHeaderBlock'));
        el('footerBackBtn').style.display = 'inline-flex';

        const pb = el('globalPromptBoxNode');
        if (step.showPrompt) {
            pb.style.display = 'block';
            pb.innerHTML = `<b>${ico('doc')} Example question:</b> "${LEARN_P.prompt}"`;
        } else pb.style.display = 'none';

        const btn = el('masterContinueActionBtn');
        btn.onclick = advance;
        btn.removeAttribute('disabled');
        btn.innerText = 'Continue';

        const board = el('visualDisplayBoard');
        board.innerHTML = '';
        step.render(board, btn);
        playEntrance(board);
    }

    /* ================================================================
       PROGRESS REPORT
       ================================================================ */
    const CHECK_LABELS = ['Boundary', 'Paragraph 1', 'Paragraph 2', 'Thesis', 'Conclusion'];
    const CHECK_CHAPTER = [1, 3, 3, 4, 4];
    window.renderProgress = function () {
        mode = 'progress';
        showChrome(true);
        pauseTimer();
        renderNav();
        setClockVisible(false);
        el('footerBackBtn').style.display = 'none';
        el('globalPromptBoxNode').style.display = 'none';
        el('headerWatermark').innerHTML = ico('layers');
        el('appStepBadge').innerText = 'Your journey';
        el('appStepTitle').innerText = 'Progress report';
        el('appStepSubtitle').innerText = 'What you have learned, how your plans are improving, and the one thing to work on next.';
        restartAnimation(el('stageHeaderBlock'));

        const doneCh = CHAPTERS.filter((c, i) => chapterSeen[i] >= c.steps.length).length;
        let hDone = `<span class="compare-label">The method - ${doneCh} of ${CHAPTERS.length} chapters</span>
            <div class="prog-grid">` + CHAPTERS.map((c, i) => {
                const complete = chapterSeen[i] >= c.steps.length, started = chapterSeen[i] > 0 && !complete;
                return `<div class="prog-ch ${complete ? 'done' : (started ? 'started' : '')}" style="animation-delay:${i * 0.05}s; cursor:pointer;" onclick="jumpToChapter(${i})">
                    <span class="pc-num">${complete ? '✓' : NAV[i].num}</span><span class="pc-name">${NAV[i].name}</span></div>`;
            }).join('') + `</div>`;

        let hPractice = '';
        if (!attempts.length) {
            hPractice = `<div class="focus-card"><span class="focus-tag">Practice history</span><p>Nothing here yet - your first plan starts your record. Times, checklist scores and trends will all build up on this page as you go.</p></div>`;
        } else {
            const best = Math.max(...attempts.map(a => a.checks));
            const withSecs = attempts.filter(a => typeof a.secs === 'number');
            const avgSecs = withSecs.length ? Math.round(withSecs.reduce((s, a) => s + a.secs, 0) / withSecs.length) : null;
            const avgStr = avgSecs === null ? '-' : Math.floor(avgSecs / 60) + ':' + String(avgSecs % 60).padStart(2, '0');
            const recent = attempts.slice(-10);
            const helpRecent = attempts.slice(-3).filter(a => a.peeked || a.coached).length;
            hPractice = `
                <span class="compare-label">Practice</span>
                <div class="stat-row">
                    <div class="stat-card"><span class="sc-val">${attempts.length}</span><span class="sc-lab">Plans made</span></div>
                    <div class="stat-card" style="animation-delay:0.06s;"><span class="sc-val">${best}/5</span><span class="sc-lab">Best checklist</span></div>
                    <div class="stat-card" style="animation-delay:0.12s;"><span class="sc-val">${avgStr}</span><span class="sc-lab">Avg time</span></div>
                </div>
                <div class="spark-wrap">
                    <span class="spark-title">Checklist score, last ${recent.length} plans</span>
                    <div class="spark">` + recent.map(a => `<i class="${a.checks === 5 ? 'full' : ''}" style="height:${Math.max(10, a.checks / 5 * 100)}%"></i>`).join('') + `</div>
                    <div class="spark-x">` + recent.map((a, i) => `<span>${attempts.length - recent.length + i + 1}</span>`).join('') + `</div>
                </div>`;

            // Question-type coverage
            const typeCounts = {};
            QTYPES.forEach(q => typeCounts[q.name] = 0);
            attempts.forEach(a => {
                const t = a.qtype || (PRACTICE_BANK.find(p => p.id === a.id) || {}).qtype;
                if (t && typeCounts[t] !== undefined) typeCounts[t]++;
            });
            const tShort = { 'Discussion': 'Discussion', 'Opinion': 'Opinion', 'Advantages & Disadvantages': 'Adv / Disadv', 'Double Question': 'Double Q', 'Problem & Solution': 'Prob / Sol' };
            const untried = QTYPES.filter(q => typeCounts[q.name] === 0);
            hPractice += `
                <span class="compare-label">Question-type coverage</span>
                <div class="tcov-row">` + QTYPES.map((q, i) => `
                    <div class="tcov-chip ${typeCounts[q.name] ? 'done' : ''}" style="animation-delay:${i * 0.05}s" onclick="setTypeFilter('${q.name.replace(/'/g, "\\'")}'); ">
                        <span class="tc-n">${typeCounts[q.name] || '-'}</span><span class="tc-name">${tShort[q.name]}</span></div>`).join('') + `</div>` +
                (untried.length
                    ? `<div class="focus-card" style="animation-delay:0.08s;"><span class="focus-tag">Not yet planned</span><p>You haven't planned a <b>${tShort[untried[0].name]}</b> question yet - tap it above to draw one. Full coverage means no surprises on exam day.</p></div>`
                    : `<div class="focus-card" style="animation-delay:0.08s;"><span class="focus-tag">Full coverage</span><p>You have planned every question type at least once - whatever appears on exam day, you've met it here first.</p></div>`);

            // Weakest area over the last 5 attempts that carry detail
            const detailed = attempts.filter(a => Array.isArray(a.detail)).slice(-5);
            if (detailed.length) {
                const fails = [0, 0, 0, 0, 0];
                detailed.forEach(a => a.detail.forEach((ok, i) => { if (!ok) fails[i]++; }));
                const worst = fails.indexOf(Math.max(...fails));
                if (fails[worst] > 0) {
                    hPractice += `<div class="focus-card" style="animation-delay:0.1s;"><span class="focus-tag">Work on next</span>
                        <p>Your most common gap recently: <b>${CHECK_LABELS[worst]}</b> - missing in ${fails[worst]} of your last ${detailed.length} plans. A quick review helps: <button class="peek-btn" onclick="jumpToChapter(${CHECK_CHAPTER[worst]})">open ${NAV[CHECK_CHAPTER[worst]].num} · ${NAV[CHECK_CHAPTER[worst]].name} →</button></p></div>`;
                } else {
                    hPractice += `<div class="focus-card" style="animation-delay:0.1s;"><span class="focus-tag">Work on next</span>
                        <p>All five checklist items present in your recent plans ${helpRecent ? '- now try a run without the coach or peeking' : '- fully independent, too'}. Keep the streak going with a new question type.</p></div>`;
                }
            }
        }

        const board = el('visualDisplayBoard');
        board.innerHTML = hDone + hPractice + classBanner() + `<button class="reset-link" onclick="resetProgress()">↺ Reset all progress</button>`;
        playEntrance(board);

        const btn = el('masterContinueActionBtn');
        btn.removeAttribute('disabled');
        btn.innerText = attempts.length ? '▶ Plan another question' : '▶ Make your first plan';
        btn.onclick = enterPractise;
    };

    function learnedAllChapters() {
        return CHAPTERS.length && chapterSeen.every((s, i) => CHAPTERS[i] && s >= CHAPTERS[i].steps.length);
    }
    function drawPrompt() {
        const typed = typeFilter === 'All' ? PRACTICE_BANK : PRACTICE_BANK.filter(p => p.qtype === typeFilter);
        const base = typed.length ? typed : PRACTICE_BANK;
        const currentId = currentPrompt ? currentPrompt.id : null;
        // Prefer questions not yet completed; always avoid repeating the one on screen.
        let pool = base.filter(p => !usedPromptIds.includes(p.id) && p.id !== currentId);
        if (!pool.length) pool = base.filter(p => p.id !== currentId);  // seen them all - just don't repeat
        if (!pool.length) pool = base;                                   // only one in this filter
        return pool[Math.floor(Math.random() * pool.length)];
    }

    window.analyseCustomQuestion = async function () {
        const qtext = el('customQInput') ? el('customQInput').value.trim() : '';
        if (!qtext) return;
        const panel = el('customQPanel');
        const btn = el('masterContinueActionBtn');
        btn.setAttribute('disabled', 'true');
        panel.innerHTML = `<div class="ai-feedback-panel"><span class="spinner-dot"></span><span class="spinner-dot"></span><span class="spinner-dot"></span> Reading your question like an examiner...</div>`;

        const sys = `You analyse IELTS Writing Task 2 questions for a planning app. The user sends one exam question. Reply with ONLY a valid JSON object - no markdown, no code fences, no explanation. Keys:
"qtype": exactly one of "Discussion", "Opinion", "Advantages & Disadvantages", "Double Question", "Problem & Solution"
"topic": a 1-2 word topic label (e.g. "Health", "Education")
"boundary": the single word or short phrase in the question that limits WHO or WHAT the essay is about
"pillarA": {"label": what body paragraph 1 should cover, 3-6 words, "keywords": 4-6 lowercase words or word-stems a student's notes would likely contain if they covered it}
"pillarB": the same for body paragraph 2
"loopTrap": one example of a circular reason for this topic - a claim whose "because..." only restates the claim in other words
"chk4": a short label (5-10 words) for what the thesis/position line must do for this question type
"thesisWords": 3-5 lowercase words whose presence in notes suggests the thesis line exists (contrast or stance words)
"model": {"boundary": "Boundary: ...", "p1": "P1: idea / reason / eg ...", "p2": "P2: idea / reason / eg ...", "thesis": "Thesis: ...", "concl": "Concl: restate stance + best reason"} - a 5-line note-form model plan for this exact question, each line under 15 words, abbreviations welcome.
If the text is NOT an IELTS Task 2 essay question, reply with exactly {"error": "not_task2"}.`;

        try {
            const raw = await aiCall(sys, [{ role: 'user', text: qtext }], 800);
            const cleaned = raw.replace(/^\s*```(?:json)?/i, '').replace(/```\s*$/, '').trim();
            const obj = JSON.parse(cleaned);
            if (obj.error) {
                panel.innerHTML = `<div class="ai-feedback-panel">That doesn't look like a complete Task 2 question. Paste the whole thing - including the instruction line, like "Discuss both views" or "Do you agree or disagree?".</div>`;
                btn.removeAttribute('disabled');
                return;
            }
            if (!obj.boundary || !obj.pillarA || !obj.pillarB || !obj.model) throw new Error('incomplete');
            currentPrompt = {
                id: 'custom-' + Date.now(),
                custom: true,
                topic: obj.topic || 'Your question',
                qtype: obj.qtype || 'Discussion',
                prompt: qtext,
                boundary: String(obj.boundary),
                pillarA: { label: obj.pillarA.label || 'side A', keywords: (obj.pillarA.keywords || []).map(k => String(k).toLowerCase()) },
                pillarB: { label: obj.pillarB.label || 'side B', keywords: (obj.pillarB.keywords || []).map(k => String(k).toLowerCase()) },

                chk4: obj.chk4 || 'A thesis note naming both sides + your stance',

                model: {
                    boundary: obj.model.boundary || ('Boundary: ' + obj.boundary),
                    p1: obj.model.p1 || 'P1: idea / reason / eg',
                    p2: obj.model.p2 || 'P2: idea / reason / eg',
                    thesis: obj.model.thesis || 'Thesis: while ..., ...',
                    concl: obj.model.concl || 'Concl: restate stance + best reason'
                }
            };
            studentPlanNotes = '';
            studentEssayText = '';
            studentIntroText = '';
            feedbackReceived = false;
            peekedThisAttempt = false;
            coachHistory = [];
            coachedThisAttempt = false;
            remainingSeconds = 420;
            timerStarted = false;
            showToast('Question analysed ✓');
            renderDrawScreen();
        } catch (err) {
            if (err.code === 'nokey') { showAISetup(panel, 'Your own questions need an AI connection - it reads the question and builds your checklist and model plan.', () => analyseCustomQuestion()); }
            else if (err.code === 'auth') { clearAIKey(); showAISetup(panel, '⚠️ That key was rejected. Check it and paste it again.', () => analyseCustomQuestion()); }
            else panel.innerHTML = `<div class="ai-feedback-panel">⚠️ Couldn't analyse that question - check it is a complete Task 2 question and try again.</div>`;
            btn.removeAttribute('disabled');
        }
    };

    /* The five scaffolded plan fields - combined into one notes string so the
       checklist, coach and examiner feedback all keep working unchanged. */
    const PS_FIELDS = [
        { id: 'ps_boundary', key: 'boundary', prefix: 'Boundary:' },
        { id: 'ps_p1', key: 'p1', prefix: 'P1:' },
        { id: 'ps_p2', key: 'p2', prefix: 'P2:' },
        { id: 'ps_thesis', key: 'thesis', prefix: 'Thesis:' },
        { id: 'ps_concl', key: 'concl', prefix: 'Concl:' }
    ];
    function parsePlanNotes(notes) {
        const map = { boundary: '', p1: '', p2: '', thesis: '', concl: '' };
        (notes || '').split('\n').forEach(line => {
            const l = line.trim();
            if (!l) return;
            const low = l.toLowerCase();
            let matched = null;
            if (low.startsWith('boundary')) matched = 'boundary';
            else if (low.startsWith('p1')) matched = 'p1';
            else if (low.startsWith('p2')) matched = 'p2';
            else if (low.startsWith('thesis')) matched = 'thesis';
            else if (low.startsWith('concl')) matched = 'concl';
            if (matched) map[matched] = l.replace(/^[a-z0-9]+\s*:\s*/i, '');
            else map.p1 = map.p1 ? map.p1 + ' ' + l : l;
        });
        return map;
    }
    function composePlanNotes() {
        const parts = [];
        PS_FIELDS.forEach(f => {
            const n = el(f.id);
            if (!n) return;
            const v = n.value.trim();
            if (v) parts.push(f.prefix + ' ' + v);
        });
        return parts.join('\n');
    }
    function handlePlanInput() {
        studentPlanNotes = composePlanNotes();
        const lower = studentPlanNotes.toLowerCase();
        const p = currentPrompt;
        const typed = PS_FIELDS.map(f => { const n = el(f.id); return n ? n.value : ''; }).join(' ');
        const wc = typed.trim().split(/\s+/).filter(w => w.length > 0).length;
        el('planWordCount').innerText = wc + ' words';
        setChk('chk_boundary', lower.includes(p.boundary.toLowerCase()));
        setChk('chk_p1', p.pillarA.keywords.some(k => lower.includes(k)));
        setChk('chk_p2', p.pillarB.keywords.some(k => lower.includes(k)));
        setChk('chk_thesis', (p.thesisWords || ['while', 'although', 'whereas', 'however']).some(w => lower.includes(w)));
        setChk('chk_concl', ['concl', 'conclusion', 'restate', 'stance'].some(w => lower.includes(w)));
        // Feedback button is always visible, greyed until there's a real plan to mark.
        const fb = el('planFeedbackBtn');
        if (fb) {
            if (wc >= 25) {
                fb.removeAttribute('disabled');
                if (fb.innerText.includes('unlocks')) fb.innerHTML = ico('spark') + ' Get examiner feedback on my plan';
            } else {
                fb.setAttribute('disabled', 'true');
                fb.innerHTML = ico('spark') + ' Examiner feedback - unlocks at 25 words (' + wc + ' so far)';
            }
        }
        // The compare step unlocks with enough notes - it must not depend on the AI.
        if (pState === 'plan') {
            const cont = el('masterContinueActionBtn');
            if (cont) { if (wc >= 25) cont.removeAttribute('disabled'); else cont.setAttribute('disabled', 'true'); }
        }
    }
    function setChk(id, met) {

    }
    function checksDetail() {
        const lower = studentPlanNotes.toLowerCase();
        const p = currentPrompt;
        return [
            lower.includes(p.boundary.toLowerCase()),
            p.pillarA.keywords.some(k => lower.includes(k)),
            p.pillarB.keywords.some(k => lower.includes(k)),
            (p.thesisWords || ['while', 'although', 'whereas', 'however']).some(w => lower.includes(w)),
            ['concl', 'conclusion', 'restate', 'stance'].some(w => lower.includes(w))
        ];
    }

    /* ---------- Class reporting (opt-in, for teachers' dashboard) ---------- */

    const AI_PROVIDER_KEY = 'examacademy_ai_provider';
    const AI_KEY_KEY = 'examacademy_ai_key';
    const LEGACY_KEY = 'examacademy_anthropic_key';
    function getAIConfig() {
        try {
            let provider = localStorage.getItem(AI_PROVIDER_KEY);
            let key = localStorage.getItem(AI_KEY_KEY) || '';
            if (!key && localStorage.getItem(LEGACY_KEY)) { key = localStorage.getItem(LEGACY_KEY); provider = 'anthropic'; }
            return { provider: provider || 'gemini', key: key };
        } catch (e) { return { provider: 'gemini', key: '' }; }
    }
    function setAIConfig(provider, key) { try { localStorage.setItem(AI_PROVIDER_KEY, provider); localStorage.setItem(AI_KEY_KEY, key); localStorage.removeItem(LEGACY_KEY); } catch (e) {} }
    function clearAIKey() { try { localStorage.removeItem(AI_KEY_KEY); localStorage.removeItem(LEGACY_KEY); } catch (e) {} }

    let aiSetupProvider = 'gemini';
    let pendingAIRetry = null;
    function showAISetup(panel, note, retryFn) {
        if (!panel) return;
        const cfg = getAIConfig();
        aiSetupProvider = cfg.provider;
        pendingAIRetry = retryFn || null;
        panel.innerHTML = `
            <div class="ai-feedback-panel"><b>${ico('gear')} Connect your AI</b><br><br>${note || 'Choose a provider and paste its API key once. It is saved only on this device and sent only to that provider.'}<br><br>
            <div class="provider-row">
                <button class="provider-chip ${cfg.provider === 'gemini' ? 'sel' : ''}" id="prov_gemini" onclick="pickProvider('gemini')">Google Gemini</button>
                <button class="provider-chip ${cfg.provider === 'anthropic' ? 'sel' : ''}" id="prov_anthropic" onclick="pickProvider('anthropic')">Claude (Anthropic)</button>
            </div>
            <input id="apiKeyInput" type="password" placeholder="${cfg.provider === 'gemini' ? 'AIza...' : 'sk-ant-...'}" value="${cfg.key ? cfg.key : ''}" style="width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--line-strong); font-family:var(--font-body); font-size:0.85rem; outline:none;">
            <button class="ai-feedback-btn" style="margin-top:10px;" onclick="saveAIAndRetry()">Save & continue</button></div>`;
        const i = el('apiKeyInput');
        if (i) i.focus();
    }
    window.pickProvider = function (prov) {
        aiSetupProvider = prov;
        const g = el('prov_gemini'), a = el('prov_anthropic'), i = el('apiKeyInput');
        if (g) g.classList.toggle('sel', prov === 'gemini');
        if (a) a.classList.toggle('sel', prov === 'anthropic');
        if (i) i.placeholder = prov === 'gemini' ? 'AIza...' : 'sk-ant-...';
    };
    window.saveAIAndRetry = function () {
        const i = el('apiKeyInput');
        const k = i ? i.value.trim() : '';
        if (!k) { if (i) i.style.borderColor = 'var(--color-error)'; return; }
        setAIConfig(aiSetupProvider || 'gemini', k);
        if (pendingAIRetry) { const fn = pendingAIRetry; pendingAIRetry = null; fn(); }
    };
    window.openAISetup = function () {
        const panel = el('planFeedbackPanel') || el('createPanel');
        if (panel) showAISetup(panel, 'Change your AI provider or key any time.', null);
    };

    /* Unified call - messages: [{role:'user'|'assistant', text}]
       Talks to YOUR server/server.js at POST /api/ielts-evaluator, sending
       { systemInstruction, contents, maxTokens } and reading back { reply }. */
    async function aiCall(system, messages, maxTokens) {
        if (BACKEND_URL) {
            try {
                const headers = { 'Content-Type': 'application/json' };
                if (APP_SECRET) headers['x-app-secret'] = APP_SECRET;
                const resp = await fetch(BACKEND_URL.replace(/\/$/, '') + '/api/ielts-evaluator', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ systemInstruction: system, contents: messages, maxTokens: maxTokens })
                });
                if (!resp.ok) {
                    const d = await resp.json().catch(() => ({}));
                    const e = new Error(d.message || ('HTTP ' + resp.status)); e.code = 'api'; throw e;
                }
                const data = await resp.json();
                return (data.reply || '').trim();
            } catch (backendErr) {
                // Backend down or errored - quietly fall back to a personal key if one is saved.
                if (!getAIConfig().key) {
                    if (backendErr.code) throw backendErr;
                    const e = new Error('Backend unreachable'); e.code = 'api'; throw e;
                }
            }
        }
        const cfg = getAIConfig();
        if (!cfg.key) { const e = new Error('No AI key'); e.code = 'nokey'; throw e; }
        if (cfg.provider === 'gemini') {
            const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + encodeURIComponent(cfg.key), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    systemInstruction: { parts: [{ text: system }] },
                    contents: messages.map(m => ({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.text }] })),
                    generationConfig: { maxOutputTokens: maxTokens }
                })
            });
            if (resp.status === 400 || resp.status === 401 || resp.status === 403) { const e = new Error('auth'); e.code = 'auth'; throw e; }
            if (!resp.ok) { const d = await resp.json().catch(() => ({})); const e = new Error((d.error && d.error.message) || ('HTTP ' + resp.status)); e.code = 'api'; throw e; }
            const data = await resp.json();
            return (((data.candidates || [])[0] || {}).content || { parts: [] }).parts.map(p => p.text || '').join('').trim();
        } else {
            const resp = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-api-key': cfg.key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
                body: JSON.stringify({ model: 'claude-sonnet-5', max_tokens: maxTokens, system: system, messages: messages.map(m => ({ role: m.role, content: m.text })) })
            });
            if (resp.status === 401 || resp.status === 403) { const e = new Error('auth'); e.code = 'auth'; throw e; }
            if (!resp.ok) { const d = await resp.json().catch(() => ({})); const e = new Error((d.error && d.error.message) || ('HTTP ' + resp.status)); e.code = 'api'; throw e; }
            const data = await resp.json();
            return (data.content || []).map(b => b.text || '').join('\n').trim();
        }
    }

    /* ---------- Examiner feedback on the full plan ---------- */
    window.requestPlanFeedback = async function () {
        pauseTimer();
        const p = currentPrompt;
        const panel = el('planFeedbackPanel');
        const btn = el('planFeedbackBtn');
        btn.setAttribute('disabled', 'true');
        panel.innerHTML = `<div class="ai-feedback-panel"><span class="spinner-dot"></span><span class="spinner-dot"></span><span class="spinner-dot"></span> Reading your plan like an examiner...</div>`;

        const systemPrompt = `You are an IELTS Writing examiner reviewing a student's PLANNING NOTES for a Task 2 essay, not the essay itself. The student had 7 minutes. Notes are EXPECTED to be short, abbreviated, note-form - fragments, arrows and abbreviations are correct planning technique; never criticise note-form style itself.

Essay prompt: "${p.prompt}"
Question type: ${p.qtype}. For this type, paragraph 1 should cover "${p.pillarA.label}" and paragraph 2 "${p.pillarB.label}". Check 4 for this type means: ${p.chk4}.

A reference model plan for this prompt (for your judgement only - do not require identical ideas, any valid ideas are fine):
${p.model.boundary}
${p.model.p1}
${p.model.p2}
${p.model.thesis}
${p.model.concl}

Assess five checks:
1. Boundary/scope noted (here: "${p.boundary}").
2. Paragraph 1 (${p.pillarA.label}): main idea + reason + one concrete example.
3. Paragraph 2 (${p.pillarB.label}): main idea + reason + one concrete example.
4. ${p.chk4}.
5. Conclusion note: restates the stance and names the strongest reason to echo; must plan no new ideas.

Also run the Loop Test on their reasons: a reason must add a new mechanism or fact, not restate its claim in different words. A loop for this topic looks like: "${p.loopTrap}"

Write in clear English suited to an IELTS band 6.5–7 candidate. Under 150 words, plain text, no markdown headers or asterisks. Structure exactly:
Line 1-5: the five checks, each as "🟢", "🟠" or "🔴" followed by 3-6 words (e.g. "🟢 Boundary noted" / "🟠 P1 example too vague" / "🔴 No conclusion line").
Then "Fix this first:" - the single most important gap or loop-risk, quoting their actual notes.
Then "Next plan, focus on:" - one short instruction to carry into their next practice loop.
Be direct and specific, referencing their actual notes. No numeric band scores.`;

        try {
            const text = await aiCall(systemPrompt, [{ role: 'user', text: 'My plan notes:\n\n' + studentPlanNotes }], 600);
            panel.innerHTML = `<div class="ai-feedback-panel"><b>${ico('spark')} Examiner feedback</b><br><br>${text || 'No feedback returned - try again.'}</div>`;
            el('masterContinueActionBtn').removeAttribute('disabled');
        } catch (err) {
            if (err.code === 'nokey') { showAISetup(panel, null, () => requestPlanFeedback()); }
            else if (err.code === 'auth') { clearAIKey(); showAISetup(panel, '⚠️ That key was rejected by the provider. Please check it and paste it again.', () => requestPlanFeedback()); }
            else panel.innerHTML = `<div class="ai-feedback-panel">⚠️ Something went wrong getting your feedback - give it a moment and try again.</div>`;
        } finally {
            btn.removeAttribute('disabled');
            btn.innerHTML = ico('redo') + ' Get updated feedback';
        }
    };

    /* ---------- Full-essay AI marking ---------- */
    let studentEssayText = '';
    window.toggleEssayMark = function () {
        const w = el('essayMarkWrap');
        if (!w) return;
        const open = w.style.display !== 'none';
        w.style.display = open ? 'none' : 'block';
        // Note: the exam clock keeps running while the essay box is open - writing IS the timed part.
        if (!open) { const ei = el('essayInput'); if (ei) ei.focus(); }
    };
    window.handleEssayInput = function () {
        const ei = el('essayInput');
        if (!ei) return;
        studentEssayText = ei.value;
        const wc = studentEssayText.trim().split(/\s+/).filter(w => w.length > 0).length;
        const c = el('essayWordCount'); if (c) c.innerText = wc + ' words';
        const b = el('essayFeedbackBtn');
        if (b) { if (wc >= 120) b.removeAttribute('disabled'); else b.setAttribute('disabled', 'true'); }
    };
    window.requestEssayFeedback = async function () {
        const p = currentPrompt;
        const panel = el('essayFeedbackPanel');
        const btn = el('essayFeedbackBtn');
        if (!p || !panel || !btn) return;
        pauseTimer();
        btn.setAttribute('disabled', 'true');
        panel.innerHTML = `<div class="ai-feedback-panel"><span class="spinner-dot"></span><span class="spinner-dot"></span><span class="spinner-dot"></span> Reading your essay like an examiner...</div>`;
        const sys = `You are an experienced IELTS Writing examiner marking a Task 2 essay for a student aiming for band 7.

The exam question: "${p.prompt}" (type: ${p.qtype}).

Mark against the four official criteria. Reply in plain text, no markdown, in exactly this shape:
Overall estimate: band X.X
Task Response X.X - one sentence, quoting their words where useful.
Coherence & Cohesion X.X - one sentence.
Vocabulary X.X - one sentence.
Grammar X.X - one sentence.
Fix first: the ONE change that would raise the band most, in 1-2 sentences.
Well done: one sentence naming something specific they did well.

Use clear English for a band 6.5 student. Be honest but kind. If the essay is under 250 words, say so - it caps Task Response. If both body paragraphs lack the idea → reason → example layers, point to the weakest layer.`;
        try {
            const fb = await aiCall(sys, [{ role: 'user', text: 'My essay:\n\n' + studentEssayText }], 700);
            panel.innerHTML = `<div class="ai-feedback-panel">${fb.replace(/</g, '&lt;').replace(/\n/g, '<br>')}</div>`;
            reportActivity('essay', p.qtype, 0);
        } catch (err) {
            if (err.code === 'nokey') showAISetup(panel, 'Connect your AI to have essays marked.', () => requestEssayFeedback());
            else if (err.code === 'auth') { clearAIKey(); showAISetup(panel, '⚠️ That key was rejected. Paste it again.', () => requestEssayFeedback()); }
            else panel.innerHTML = `<div class="ai-feedback-panel">⚠️ Couldn't reach the AI just now - give it a moment and try again.</div>`;
        } finally {
            btn.removeAttribute('disabled');
            btn.innerHTML = ico('redo') + ' Mark it again';
        }
    };

    /* ---------- Socratic coach: one guiding question per turn ---------- */
    let coachHistory = [];
    let coachThinking = false;
    let coachedThisAttempt = false;
    function coachSystemPrompt() {
        const p = currentPrompt;
        return `You are a Socratic coach for IELTS Task 2 PLANNING (not essay writing). Speak simple, warm English for a band 6.5 student.

The exam prompt: "${p.prompt}" (type: ${p.qtype}; paragraph 1 should cover ${p.pillarA.label}, paragraph 2 ${p.pillarB.label}).
The student's current plan notes right now:
"""${studentPlanNotes || '(empty so far)'}"""

The method they follow - five note lines: 1) boundary word, 2) P1 idea/reason/example, 3) P2 idea/reason/example, 4) ${p.chk4}, 5) conclusion note. Reasons must pass the Loop Test: add a new mechanism or fact, never restate the claim in other words.

STRICT RULES for every reply:
- At most ONE short encouraging sentence, then exactly ONE guiding question. Nothing else.
- Aim the question at the weakest or most missing part of their current notes.
- NEVER write plan content, ideas, examples, or answers for them. Questions only.
- Never ask about more than one thing at once. Maximum 35 words in total.`;
    }
    function renderCoachUI() {
        const wrap = el('coachWrap');
        if (!wrap) return;
        if (!coachHistory.some(m => m.role === 'assistant') && !coachThinking) { wrap.innerHTML = ''; return; }
        let bubbles = coachHistory.filter(m => m.show !== false).map(m =>
            `<div class="coach-bubble ${m.role === 'assistant' ? 'cb-coach' : 'cb-student'}">${m.role === 'assistant' ? ico('chat') + ' ' : ''}${m.text.replace(/</g, '&lt;')}</div>`).join('');
        if (coachThinking) bubbles += `<div class="coach-bubble cb-coach">${ico('chat')} <span class="spinner-dot"></span><span class="spinner-dot"></span><span class="spinner-dot"></span></div>`;
        wrap.innerHTML = `<div class="coach-panel">${bubbles}
            <div class="coach-input-row">
                <input class="coach-input" id="coachInput" placeholder="Answer the coach - or just update your notes above">
                <button class="ai-feedback-btn coach-send" onclick="sendCoachReply()">↑</button>
            </div>
            <button class="peek-btn" style="margin-top:8px;" onclick="askCoach()">${ico('redo')} Ask me a different question</button>
        </div>`;
        const ci = el('coachInput');
        if (ci) ci.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.stopPropagation(); sendCoachReply(); } });
    }
    async function coachTurn(seedText, showSeed) {
        if (coachThinking) return;
        coachedThisAttempt = true;
        coachHistory.push({ role: 'user', text: seedText, show: !!showSeed });
        coachThinking = true;
        renderCoachUI();
        try {
            const q = await aiCall(coachSystemPrompt(), coachHistory.slice(-9).map(m => ({ role: m.role, text: m.text })), 150);
            coachHistory.push({ role: 'assistant', text: q || 'What is the boundary word in this prompt - who or what is it really about?' });
        } catch (err) {
            coachHistory.pop();
            if (err.code === 'nokey' || err.code === 'auth') {
                if (err.code === 'auth') clearAIKey();
                showAISetup(el('planFeedbackPanel'), err.code === 'auth' ? '⚠️ That key was rejected. Please paste it again.' : 'Connect your AI to start coaching.', () => askCoach());
            } else {
                coachHistory.push({ role: 'assistant', text: '⚠️ I could not reach the AI just now - try again in a moment.' });
            }
        } finally {
            coachThinking = false;
            renderCoachUI();
        }
    }
    window.askCoach = function () {
        coachTurn(coachHistory.length ? 'Ask me another question about a different part of my plan.' : 'Please ask me your first coaching question about my plan.', false);
    };
    window.sendCoachReply = function () {
        const ci = el('coachInput');
        const t = ci ? ci.value.trim() : '';
        if (!t) return;
        coachTurn(t, true);
    };

    /* ================================================================
       EFFECTS
       ================================================================ */
    function spawnSuccessRing(node) {
        try {
            if (getComputedStyle(node).position === 'static') node.style.position = 'relative';
            const s = document.createElement('span');
            s.className = 'success-ring';
            node.appendChild(s);
            setTimeout(() => s.remove(), 760);
        } catch (e) {}
    }
    document.addEventListener('pointermove', function (e) {
        const t = e.target.closest && e.target.closest('.tap-card, .home-door');
        if (!t) return;
        const r = t.getBoundingClientRect();
        t.style.setProperty('--mx', (e.clientX - r.left) + 'px');
        t.style.setProperty('--my', (e.clientY - r.top) + 'px');
    });
    document.addEventListener('pointerdown', function (e) {
        const b = e.target.closest && e.target.closest('.tactile-pill-btn, .ai-feedback-btn');
        if (!b || b.disabled) return;
        const r = b.getBoundingClientRect();
        const s = document.createElement('span');
        s.className = 'btn-ripple';
        const d = Math.max(r.width, r.height);
        s.style.width = s.style.height = d + 'px';
        s.style.left = (e.clientX - r.left - d / 2) + 'px';
        s.style.top = (e.clientY - r.top - d / 2) + 'px';
        b.appendChild(s);
        setTimeout(() => s.remove(), 650);
    });
    document.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter') return;
        const tag = (e.target && e.target.tagName || '').toLowerCase();
        if (tag === 'textarea' || tag === 'input') return;
        const btn = el('masterContinueActionBtn');
        if (btn && !btn.disabled) { e.preventDefault(); btn.click(); }
    });

    /* ================================================================
       BOOT
       ================================================================ */
    CHAPTERS = buildChapters();
    CHAPTERS.forEach((c, i) => c.steps.unshift(makeIntroStep(i)));  // each chapter opens with its objective screen
    loadProgress();
    renderClock();
    renderSplash();

    // Dock the exam clock into the corner once its own row scrolls away.
    window.addEventListener('scroll', function () {
        const n = el('clockBadgeNode');
        if (n) n.classList.toggle('clock-docked', window.scrollY > 70);
    }, { passive: true });

    // On iOS, hide the grey keyboard toolbar (the "Done" / "<" "X" bar) that
    // WKWebView shows above the keyboard. Harmless/no-op in a normal browser.
    try {
        const kb = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Keyboard;
        if (kb && kb.setAccessoryBarVisible) kb.setAccessoryBarVisible({ isVisible: false });
    } catch (e) {}
</script>
