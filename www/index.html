<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Exam Academy — IELTS 7-Minute Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-orange: #F0923B;
            --brand-orange-deep: #d97b22;
            --brand-orange-wash: rgba(240,146,59,0.10);
            --brand-black: #171512;
            --paper: #fdfcfa;
            --paper-warm: #f7f4ef;
            --line: #e9e4dc;
            --line-strong: #d8d1c6;

            --text-main: #171512;
            --text-secondary: #5f594f;
            --text-muted: #97907f;

            --color-success: #1d7a3f;
            --color-success-light: #e9f5ee;
            --color-error: #c2402f;
            --color-error-light: #faeae6;
            --color-info-light: #f4f0e9;

            --note-bg: linear-gradient(180deg, #fffbee, #fff3d6);
            --note-border: #f0d894;
            --note-ink: #5b4300;

            --font-serif: 'Space Grotesk', 'Inter', sans-serif;
            --font-display: 'Inter', system-ui, sans-serif;
            --font-body: 'Inter', system-ui, sans-serif;
            --font-note: 'Caveat', cursive;

            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --glide: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            margin: 0; padding: 30px 0 52px 0;
            color: var(--text-main); line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh; display: flex; flex-direction: column;
            background:
                radial-gradient(1000px 400px at 50% -10%, rgba(240,146,59,0.07), transparent 60%),
                var(--paper-warm);
        }

        .grain-overlay { position: fixed; inset: 0; z-index: 5; pointer-events: none; opacity: 0.045; mix-blend-mode: multiply; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }

        .app-container { width: 100%; max-width: 470px; margin: 0 auto; padding: 0 16px; flex-grow: 1; display: flex; flex-direction: column; }

        .workspace-card {
            background: var(--paper);
            padding: 0 30px 32px 30px;
            border: none;
            border-radius: 26px; display: flex; flex-direction: column; position: relative;
            min-height: 740px; overflow: hidden;
            box-shadow: 0 2px 6px rgba(23,21,18,0.03), 0 28px 80px -28px rgba(23,21,18,0.16);
            animation: cardIntro 0.7s var(--glide) both;
        }
        .phase-ribbon { height: 5px; margin: 0 -30px 0 -30px; background: var(--brand-orange); }

        .brand-row { display: flex; align-items: center; gap: 10px; padding: 24px 44px 18px 0; border-bottom: 1px solid var(--line); margin-bottom: 18px; }
        .brand-square { width: 16px; height: 16px; background: var(--brand-orange); border-radius: 3px; flex-shrink: 0; animation: squareMorph 8s ease-in-out infinite; }
        .brand-name { font-family: var(--font-serif); font-size: 1.02rem; font-weight: 500; color: var(--text-main); letter-spacing: -0.01em; }
        .brand-name b { font-weight: 700; }
        .brand-tag { margin-left: auto; font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-muted); }

        .back-chip {
            position: absolute; top: 16px; right: 22px; z-index: 10;
            width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line-strong);
            background: #fff; color: var(--text-secondary); font-family: var(--font-display);
            font-size: 1.1rem; font-weight: 700; cursor: pointer; display: none;
            align-items: center; justify-content: center; line-height: 1; padding-bottom: 2px;
            transition: all 0.2s var(--spring);
        }
        .back-chip.chip-visible { display: flex; }
        .back-chip:hover { border-color: var(--brand-orange); color: var(--brand-orange); transform: translateX(-2px); }
        .back-chip:active { transform: scale(0.92); }

        .nav-rail { display: flex; gap: 0; width: 100%; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
        .nav-tab {
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 4px 2px 10px 2px; border: none; border-bottom: 3px solid transparent;
            background: transparent; transition: all 0.35s var(--glide); margin-bottom: -1px;
            cursor: pointer;
        }
        .nav-tab:hover .t-num, .nav-tab:hover .t-name { color: var(--brand-orange-deep); opacity: 1; }
        .nav-tab .t-num { font-family: var(--font-serif); font-size: 0.78rem; font-weight: 700; line-height: 1; color: var(--text-muted); opacity: 0.7; transition: all 0.3s ease; }
        .nav-tab .t-name { font-family: var(--font-display); font-size: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); transition: color 0.3s ease; }
        .nav-tab.done { border-bottom-color: var(--brand-orange); }
        .nav-tab.done .t-num, .nav-tab.done .t-name { color: var(--brand-orange); opacity: 1; }
        .nav-tab.active { border-bottom-color: var(--brand-black); }
        .nav-tab.active .t-num, .nav-tab.active .t-name { color: var(--brand-black); opacity: 1; }
        .nav-tab .t-dots { display: flex; gap: 3px; margin-top: 1px; min-height: 4px; }
        .nav-tab .t-dots i { width: 4px; height: 4px; border-radius: 1px; background: var(--line-strong); transition: all 0.3s var(--spring); }
        .nav-tab .t-dots i.on { background: var(--brand-orange); transform: scale(1.25); }
        .nav-tab.tab-practise { border-left: 1px solid var(--line); }
        .nav-tab.tab-practise .t-num { color: var(--brand-orange); opacity: 1; }
        .nav-tab.tab-practise.active { border-bottom-color: var(--brand-orange); }
        .nav-tab.tab-practise.active .t-name { color: var(--brand-orange-deep); }

        .clock-badge-pill { font-family: var(--font-display); font-weight: 700; color: var(--brand-orange-deep); font-size: 0.95rem; background: var(--brand-orange-wash); padding: 9px 16px; border-radius: 10px; border: 1px solid rgba(240,146,59,0.4); display: none; align-items: center; gap: 6px; white-space: nowrap; font-variant-numeric: tabular-nums; width: max-content; margin-left: auto; margin-bottom: 12px; }
        .clock-badge-pill.clock-visible { display: flex; animation: springIn 0.6s var(--spring) both; }
        .clock-badge-pill.time-critical { color: var(--color-error); background: var(--color-error-light); border-color: rgba(194,64,47,0.4); animation: pulseSoft 1s infinite ease-in-out; }

        .stage-header-block { position: relative; animation: canvasShift 0.55s var(--glide) both; }
        .step-mini-tag { font-family: var(--font-display); color: var(--brand-orange-deep); font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 6px; }
        .heading-main { font-family: var(--font-serif); font-size: 1.9rem; font-weight: 700; color: var(--text-main); margin: 0 0 9px 0; letter-spacing: -0.03em; line-height: 1.12; }
        .subtext-narrative { font-size: 0.94rem; color: var(--text-secondary); margin-bottom: 22px; line-height: 1.65; font-weight: 450; }
        .header-watermark { position: absolute; top: -14px; right: -6px; font-family: var(--font-serif); font-size: 4.2rem; font-weight: 700; color: var(--brand-orange); opacity: 0.12; pointer-events: none; line-height: 1; }

        .persistent-prompt-anchor-box {
            background: var(--paper-warm); border: 1px solid var(--line);
            border-left: 4px solid var(--brand-orange); border-radius: 12px;
            padding: 13px 16px; margin-bottom: 14px; text-align: left; font-size: 0.84rem; font-weight: 450; color: var(--text-secondary); line-height: 1.55;
        }
        .persistent-prompt-anchor-box b { color: var(--text-main); font-weight: 700; }

        .viewport-canvas { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; margin-bottom: 12px; overflow-y: auto; }
        .viewport-canvas.canvas-shift { animation: canvasShift 0.6s var(--glide) both; }

        .home-door { background: #ffffff; border: 1px solid var(--line); border-radius: 16px; padding: 24px; cursor: pointer; text-align: left; margin-bottom: 12px; transition: all 0.2s var(--spring); box-shadow: 0 2px 8px -4px rgba(23,21,18,0.07); position: relative; overflow: hidden; animation: zoomFocus 0.7s var(--glide) both; }
        .home-door:nth-child(2) { animation-delay: 0.12s; }
        .home-door:hover { border-color: var(--brand-orange); transform: translateY(-3px); box-shadow: 0 16px 34px -16px rgba(240,146,59,0.55); }
        .home-door:active { transform: scale(0.99); }
        .home-door .door-kicker { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.13em; color: var(--brand-orange-deep); display: block; margin-bottom: 8px; }
        .home-door h4 { font-family: var(--font-serif); font-size: 1.35rem; font-weight: 700; margin: 0 0 6px 0; letter-spacing: -0.02em; }
        .home-door p { margin: 0; font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; }
        .home-door .door-arrow { position: absolute; right: 22px; top: 50%; transform: translateY(-50%); font-family: var(--font-serif); font-size: 1.5rem; color: var(--brand-orange); }

        .focus-beat { animation: zoomFocus 0.85s var(--glide) both; margin-bottom: 11px; }
        .focus-beat.beat-rest { opacity: 0.45; transform: scale(0.97); transition: opacity 0.6s ease, transform 0.6s ease; }

        .theory-stmt {
            background: #ffffff; border: 1px solid var(--line); border-left: 4px solid var(--brand-orange);
            border-radius: 14px; padding: 21px 23px; text-align: left;
            font-size: 1.06rem; font-weight: 450; line-height: 1.68; color: var(--text-main);
            box-shadow: 0 8px 24px -14px rgba(23,21,18,0.14);
        }
        .theory-stmt b { color: var(--brand-orange-deep); font-weight: 700; }
        .theory-stmt .stmt-tag { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.13em; color: var(--brand-orange-deep); display: block; margin-bottom: 10px; }
        .theory-quote { background: transparent; border-left: 3px solid var(--line-strong); padding: 6px 0 6px 18px; font-family: var(--font-serif); font-size: 1.05rem; font-weight: 600; color: var(--text-secondary); line-height: 1.6; text-align: left; }
        .theory-quote .q-source { display: block; font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-top: 10px; }

        .focus-card {
            background: #ffffff; border: 1px solid var(--line);
            border-radius: 14px; padding: 20px; margin-bottom: 10px; text-align: left;
            box-shadow: 0 8px 24px -14px rgba(23,21,18,0.12);
            animation: zoomFocus 0.8s var(--glide) both;
        }
        .focus-card .focus-tag { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.13em; color: var(--brand-orange-deep); display: block; margin-bottom: 9px; }
        .focus-card p { margin: 0; font-size: 0.99rem; font-weight: 450; line-height: 1.68; color: var(--text-main); }
        .focus-card p b { font-weight: 700; }

        .laser-prompt-frame {
            background: #ffffff; border: 1px solid var(--line); border-radius: 14px; padding: 19px;
            font-size: 1.1rem; font-weight: 600; color: var(--text-main); text-align: left; line-height: 1.85; font-family: var(--font-serif);
            margin-bottom: 10px;
        }
        .text-word-token { padding: 2px 9px; border-radius: 8px; background: var(--paper-warm); color: var(--text-secondary); display: inline-block; margin: 2px 0; }
        .tap-token { cursor: pointer; transition: all 0.18s var(--spring); border: 1.5px dashed var(--line-strong); }
        .tap-token:hover { transform: translateY(-2px) scale(1.04); border-color: var(--brand-orange); background: var(--brand-orange-wash); color: var(--text-main); }
        .tap-token:active { transform: scale(0.96); }
        .tap-token.tap-right { background: var(--brand-orange); color: #fff !important; border: 1.5px solid var(--brand-orange-deep); animation: tapRight 0.5s var(--spring); pointer-events: none; }
        .tap-token.tap-wrong { animation: shakeQuick 0.4s ease; background: var(--color-error-light); color: var(--color-error); border-color: rgba(194,64,47,0.5); }

        .tap-instruction { font-family: var(--font-display); font-size: 0.82rem; font-weight: 700; color: var(--brand-orange-deep); text-align: center; margin-bottom: 13px; text-transform: uppercase; letter-spacing: 0.1em; animation: pulseNudge 2s ease-in-out infinite; }

        .tap-card { background: #ffffff; border: 1px solid var(--line); border-radius: 14px; padding: 17px 19px; margin-bottom: 10px; cursor: pointer; text-align: left; font-size: 0.97rem; font-weight: 500; line-height: 1.62; transition: all 0.18s var(--spring); animation: zoomFocus 0.7s var(--glide) both; color: var(--text-main); box-shadow: 0 2px 8px -4px rgba(23,21,18,0.08); position: relative; overflow: hidden; }
        .tap-card:hover { border-color: var(--brand-orange); transform: translateY(-2px); box-shadow: 0 10px 24px -12px rgba(240,146,59,0.5); }
        .tap-card:active { transform: scale(0.98); }
        .tap-card.tap-right { border-color: var(--brand-orange); background: var(--brand-orange-wash); color: var(--brand-orange-deep); font-weight: 700; animation: tapRight 0.5s var(--spring); pointer-events: none; }
        .tap-card.tap-wrong { animation: shakeQuick 0.4s ease; border-color: rgba(194,64,47,0.5); background: var(--color-error-light); color: var(--color-error); }
        .tap-card.tap-dim { opacity: 0.35; pointer-events: none; }

        .hl-red { background: #f9ded8; color: #9c3325; padding: 1px 7px; border-radius: 6px; font-weight: 700; }
        .hl-green { background: #ddeee3; color: #14532d; padding: 1px 7px; border-radius: 6px; font-weight: 700; }
        .hl-purple { background: #f6e3cd; color: #a05a10; padding: 1px 7px; border-radius: 6px; font-weight: 700; }

        .verdict-stamp { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 26px; border: 3px solid; border-radius: 10px; width: max-content; margin: 6px auto 14px auto; transform: rotate(-3deg); animation: stampIn 0.7s var(--spring) 0.4s both; }
        .verdict-stamp.stamp-bad { color: var(--color-error); border-color: var(--color-error); background: var(--color-error-light); }
        .verdict-stamp.stamp-good { color: var(--color-success); border-color: var(--color-success); background: var(--color-success-light); }

        .verdict-card { border-radius: 14px; padding: 17px 19px; margin-bottom: 10px; text-align: left; font-size: 0.97rem; font-weight: 450; line-height: 1.66; animation: zoomFocus 0.8s var(--glide) both; }
        .verdict-card.v-good { background: var(--color-success-light); border: 1px solid #c4e0cf; color: #14532d; }
        .verdict-card.v-bad { background: var(--color-error-light); border: 1px solid #eccdc5; color: #8c2e21; }
        .verdict-card.v-info { background: var(--color-info-light); border: 1px solid var(--line-strong); color: var(--text-main); }
        .verdict-card b { font-weight: 700; }

        .note-pad { background: var(--note-bg); border: 1.5px solid var(--note-border); border-radius: 12px; padding: 15px 20px; margin-bottom: 10px; text-align: left; box-shadow: 0 10px 28px -14px rgba(200,160,60,0.5); animation: zoomFocus 0.8s var(--glide) both; position: relative; transform: rotate(-0.4deg); }
        .note-pad::before { content: "📝"; position: absolute; top: -11px; right: 13px; font-size: 1.2rem; transform: rotate(10deg); }
        .note-pad .note-tag { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #a07a10; display: block; margin-bottom: 2px; }
        .note-pad .note-line { font-family: var(--font-note); font-size: 1.68rem; font-weight: 700; color: var(--note-ink); line-height: 1.32; }
        .note-pad .note-line + .note-tag { margin-top: 10px; }
        .note-pad .note-line.line-locked { opacity: 0.25; }
        .note-pad .note-line.line-new { animation: zoomFocus 0.8s var(--glide) 0.3s both; }

        .sentence-to-compress { position: relative; transition: all 0.6s ease; }
        .sentence-to-compress.compressed { opacity: 0.35; transform: scale(0.97); text-decoration: line-through; text-decoration-color: rgba(194,64,47,0.6); text-decoration-thickness: 2px; }
        .compress-arrow { text-align: center; font-size: 1.35rem; margin: 4px 0 10px 0; animation: zoomFocus 0.6s var(--glide) both; color: var(--brand-orange); font-family: var(--font-display); font-weight: 800; }

        .word-count-callout { font-family: var(--font-display); text-align: center; font-size: 0.85rem; font-weight: 700; color: var(--brand-orange-deep); background: var(--brand-orange-wash); border: 1px solid rgba(240,146,59,0.35); border-radius: 10px; padding: 12px 15px; margin-top: 2px; animation: zoomFocus 0.7s var(--glide) 0.45s both; letter-spacing: 0.02em; }

        .crit-map { display: flex; gap: 5px; margin-bottom: 10px; animation: zoomFocus 0.8s var(--glide) both; }
        .crit-block { flex: 1; border-radius: 12px; padding: 15px 6px; text-align: center; font-family: var(--font-display); }
        .crit-block .cb-pct { font-family: var(--font-serif); font-size: 1.3rem; font-weight: 700; display: block; }
        .crit-block .cb-label { font-size: 0.54rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-top: 3px; line-height: 1.35; }
        .crit-block.cb-plan { background: var(--brand-orange); color: #fff; box-shadow: 0 8px 20px -8px rgba(240,146,59,0.6); }
        .crit-block.cb-lang { background: var(--paper-warm); color: var(--text-secondary); border: 1px solid var(--line); }
        .crit-legend { display: flex; gap: 5px; margin-bottom: 12px; font-family: var(--font-display); font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; animation: zoomFocus 0.7s var(--glide) 0.2s both; }
        .crit-legend span { flex: 1; text-align: center; }
        .crit-legend .cl-plan { color: var(--brand-orange-deep); }
        .crit-legend .cl-lang { color: var(--text-muted); }

        .reveal-after { display: none; }
        .reveal-after.shown { display: block; animation: zoomFocus 0.5s var(--glide) both; }

        .tok-boundary { background: var(--brand-orange); color: #fff !important; font-weight: 700; }
        .tok-decoy { background: var(--brand-black); color: #fff !important; font-weight: 700; }

        .time-map { display: flex; gap: 4px; margin-bottom: 12px; animation: zoomFocus 0.8s var(--glide) both; }
        .time-block { border-radius: 10px; padding: 12px 6px; text-align: center; font-family: var(--font-display); }
        .time-block .tb-min { font-family: var(--font-serif); font-size: 1.15rem; font-weight: 700; display: block; }
        .time-block .tb-label { font-size: 0.56rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-top: 2px; }
        .time-block.tb-read { flex: 3; background: var(--paper-warm); color: var(--text-secondary); }
        .time-block.tb-plan { flex: 7; background: var(--brand-orange); color: #fff; box-shadow: 0 8px 20px -8px rgba(240,146,59,0.6); }
        .time-block.tb-write { flex: 22; background: #ffffff; border: 1px solid var(--line); color: var(--text-main); }
        .time-block.tb-check { flex: 3; background: var(--paper-warm); color: var(--text-secondary); }

        .layer-slot {
            border: 1.5px dashed var(--line-strong); border-radius: 12px; padding: 14px 17px; margin-bottom: 8px;
            display: flex; gap: 12px; align-items: flex-start; text-align: left;
            font-size: 0.94rem; font-weight: 450; color: var(--text-muted); min-height: 52px;
        }
        .layer-slot .slot-icon { font-size: 1.1rem; flex-shrink: 0; opacity: 0.4; }
        .layer-slot .slot-label { font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; display: block; margin-bottom: 3px; }
        .layer-slot.filled { border: 1px solid var(--line); background: #ffffff; color: var(--text-main); box-shadow: 0 6px 18px -10px rgba(23,21,18,0.15); border-left: 4px solid var(--brand-orange); }
        .layer-slot.filled .slot-icon { opacity: 1; }
        .layer-slot.filled .slot-label { color: var(--brand-orange-deep); }
        .layer-slot.just-filled { animation: slotFill 0.7s var(--spring) both; }
        .layer-slot.just-filled .slot-icon { animation: iconPop 0.6s var(--spring) 0.2s both; }

        .side-chip-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .side-chip { flex: 1; border-radius: 12px; padding: 16px; text-align: left; font-size: 0.9rem; font-weight: 500; line-height: 1.6; animation: zoomFocus 0.8s var(--glide) both; }
        .side-chip .sc-tag { font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; display: block; margin-bottom: 6px; }
        .side-chip.sc-a { background: var(--brand-orange-wash); border: 1px solid rgba(240,146,59,0.4); color: #8a4d0a; }
        .side-chip.sc-a .sc-tag { color: var(--brand-orange-deep); }
        .side-chip.sc-b { background: var(--paper-warm); border: 1px solid var(--line-strong); color: var(--text-main); }
        .side-chip.sc-b .sc-tag { color: var(--text-secondary); }

        .checklist-box { background: #ffffff; border: 1px solid var(--line); border-left: 4px solid var(--brand-orange); border-radius: 12px; padding: 16px 18px; margin-top: 2px; animation: zoomFocus 0.7s var(--glide) both; }
        .checklist-title { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.13em; color: var(--brand-orange-deep); display: block; margin-bottom: 10px; }
        .checklist-box ul { margin: 0; padding: 0; list-style: none; font-size: 0.92rem; font-weight: 500; color: var(--text-main); }

<script>
    const LEARN_P = {
        topic: 'Education',
        prompt: "Some people believe universities should focus on teaching practical job skills, while others think they should prioritize pure theoretical research. Discuss both views and give your opinion.",
        scope: { before: "Should ", correctToken: "universities", mid: " focus on practical job skills, or should they prioritize ", wrongToken: "theoretical research", after: "?" },
        demo: { s1: "Job training", joiner: "is", key: "vital", verb: "because it makes", s2: "graduates", loopWords: "useful and highly capable" },
        loopTrap: "Practical job training helps students learn practical, job-ready skills for the workplace.",
        halfLoop: "Practical job training is valuable because most students find it a very valuable part of their studies.",
        bridgeFull: "Practical job skills training at university is valuable because it directly reduces graduate unemployment by aligning coursework with the skills employers explicitly require.",
        position: "Universities should prioritize practical job training.",
        whyRight: "Because employers increasingly value job-ready graduates over those with purely theoretical knowledge.",
        whyWrong: "Because practical training is a very important and useful thing for university students.",
        howRight: "Computing graduates with hands-on coding experience are hired faster than those with only abstract theory.",
        howWrong: "Many people agree that practical training is useful for getting jobs.",
        sentences: {
            idea: "Universities should prioritize practical job training because it directly serves graduates' career outcomes.",
            reason: "This is because employers increasingly value job-ready graduates over those with purely theoretical knowledge.",
            example: "For instance, computing graduates with hands-on coding experience are hired faster than those with only abstract theory."
        },
        notes: {
            boundary: "Boundary: universities",
            p1: "P1: job skills → careers / employers want job-ready grads / eg CS grads hired faster",
            p2: "P2: theory → progress / core principles → applied later / eg computing ← maths logic",
            thesis: "Thesis: while job skills…, theory = more value",
            concl: "Concl: restate stance"
        },
        p2notes: { idea: "P2: theory → long-term progress", reason: "core principles → applied fields later", example: "eg computing langs ← abstract maths" },
        sideA: "practical job training", sideB: "theoretical research",
        thesisSentence: "While some argue that universities should prioritize practical job training, I believe that theoretical research delivers greater long-term societal value."

    window.tapAnswer = function (node, isCorrect) {
        const instr = document.querySelector('.tap-instruction');
        if (isCorrect) {
            node.classList.remove('tap-wrong');
            node.classList.add('tap-right');
            spawnSuccessRing(node);
            document.querySelectorAll('.tap-card:not(.tap-right), .tap-token:not(.tap-right)').forEach(n => { if (n !== node) n.classList.add('tap-dim'); });
            if (instr) { instr.innerText = "✓ Correct!"; instr.style.animation = 'none'; instr.style.color = 'var(--color-success)'; }

            openBtn();
        } else {
            node.classList.add('tap-wrong');
            setTimeout(() => node.classList.remove('tap-wrong'), 500);
            const hint = node.dataset ? node.dataset.hint : '';
            if (instr && hint) {
                if (!instr.dataset.original) instr.dataset.original = instr.innerText;

                instr.style.animation = 'none';

                if (instr && hint) {

    function renderChapterMap() {
        if (mode === 'practise') pauseTimer();
        mode = 'learn';
        chIdx = -1;
        renderNav();
        setClockVisible(false);
        el('backChip').classList.remove('chip-visible');
        el('globalPromptBoxNode').style.display = 'none';
        el('headerWatermark').innerText = '☰';
        el('appStepBadge').innerText = 'Learn the method';
        el('appStepTitle').innerText = 'Six small chapters';
        el('appStepSubtitle').innerText = 'Each one is a few minutes with its own drill. Do them in order the first time — return to any of them whenever you need.';
        restartAnimation(el('stageHeaderBlock'));

        const board = el('visualDisplayBoard');
        board.innerHTML = CHAPTERS.map((c, i) => {
            const seen = chapterSeen[i], total = c.steps.length;
            const complete = seen >= total, started = seen > 0 && !complete;
            const status = complete ? '✓ Done' : (started ? seen + ' / ' + total : '~' + CH_META[i].min + ' min');
            return `<div class="map-card ${complete ? 'complete' : (started ? 'started' : '')}" style="animation-delay:${i * 0.07}s" onclick="jumpToChapter(${i})">
                <span class="mc-num">${complete ? '✓' : NAV[i].num}</span>
                <span class="mc-body"><span class="mc-name">${NAV[i].name}</span><span class="mc-desc">${CH_META[i].desc}</span></span>
                <span class="mc-status">${status}</span>
            </div>`;
        }).join('');
        playEntrance(board);

        const nextIdx = CHAPTERS.findIndex((c, i) => chapterSeen[i] < c.steps.length);
        const btn = el('masterContinueActionBtn');
        btn.removeAttribute('disabled');
        if (nextIdx === -1) {
            btn.innerText = 'All chapters done — Practise ▶';
            btn.onclick = enterPractise;
        } else {
            btn.innerText = (chapterSeen[nextIdx] > 0 ? 'Resume ' : 'Start ') + NAV[nextIdx].num + ' · ' + NAV[nextIdx].name;
            btn.onclick = () => jumpToChapter(nextIdx);
        }
    }

    const CH_META = [
        { desc: 'Why half your mark is decided before you write', min: 2 },
        { desc: 'Find the boundary word — and dodge the decoy', min: 3 },
        { desc: 'The two-question test that catches empty reasons', min: 4 },
        { desc: 'Generate and compress a full paragraph', min: 4 },
        { desc: 'Both sides, your stance, and the conclusion line', min: 3 },
        { desc: 'The five question types — same card, new labels', min: 3 }
    ];

    function jumpToChapter(i) {
        if (mode === 'practise') pauseTimer();
        mode = 'learn';
        chIdx = i;
        stIdx = Math.min(chapterSeen[i], CHAPTERS[i].steps.length - 1);
        loadLearnStep();
    }
    function goHome() {
        if (mode === 'practise') pauseTimer();
        mode = 'home';
        renderHome();
    }
    function goBack() {
        if (mode !== 'learn' || chIdx < 0) return;
        if (stIdx > 0) { stIdx--; loadLearnStep(); }
        else { renderChapterMap(); }
    }
    function advance() {
        if (mode !== 'learn' || chIdx < 0) return;
        const steps = CHAPTERS[chIdx].steps;
        if (stIdx < steps.length - 1) {
            stIdx++;
            chapterSeen[chIdx] = Math.max(chapterSeen[chIdx], stIdx);
            loadLearnStep();
        } else {
            chapterSeen[chIdx] = steps.length;
            showToast(`${NAV[chIdx].num} ${NAV[chIdx].name} complete ✓`);
            fireConfetti(10);
            if (chIdx < CHAPTERS.length - 1) renderChapterMap();
            else enterPractise();
        }
    }

    function loadLearnStep() {
        mode = 'learn';
        chapterSeen[chIdx] = Math.max(chapterSeen[chIdx], stIdx);
        const step = CHAPTERS[chIdx].steps[stIdx];
        renderNav();
        setClockVisible(false);
        el('headerWatermark').innerText = step.wm || NAV[chIdx].num;
        el('appStepBadge').innerText = NAV[chIdx].num + " · " + NAV[chIdx].name + "  —  " + (stIdx + 1) + " / " + CHAPTERS[chIdx].steps.length;
        el('appStepTitle').innerText = step.title;
        el('appStepSubtitle').innerText = step.sub;
        restartAnimation(el('stageHeaderBlock'));
        el('backChip').classList.add('chip-visible');

        const pb = el('globalPromptBoxNode');
        if (step.showPrompt) {
            pb.style.display = 'block';
            pb.innerHTML = `<b>📌 Example question:</b> "${LEARN_P.prompt}"`;
        } else pb.style.display = 'none';

        const btn = el('masterContinueActionBtn');
        btn.onclick = advance;
        btn.removeAttribute('disabled');
        btn.innerText = 'Continue';

        const board = el('visualDisplayBoard');
        board.innerHTML = '';
        step.render(board, btn);
        playEntrance(board);
    }

    function renderHome() {
        renderNav();
        setClockVisible(false);
        el('backChip').classList.remove('chip-visible');
        el('globalPromptBoxNode').style.display = 'none';
        el('headerWatermark').innerText = '§';
        el('appStepBadge').innerText = 'Writing Task 2';
        el('appStepTitle').innerText = 'Plan your way to band 7';
        el('appStepSubtitle').innerText = 'Half your writing mark is decided before you write a sentence. Learn the 7-minute planning method once — then practise it on real prompts, as often as you like.';
        restartAnimation(el('stageHeaderBlock'));

        const learnedAll = chapterSeen.every((s, i) => CHAPTERS[i] && s >= CHAPTERS[i].steps.length);
        const board = el('visualDisplayBoard');
        board.innerHTML = `
            <div class="home-door" onclick="renderChapterMap()">
                <span class="door-kicker">Step 1 · ~20 minutes</span>
                <h4>Learn the method</h4>
                <p>Six short chapters with a micro-drill in each: why planning wins, decoding, the Loop Test, building paragraphs, the thesis — and adapting to all five question types. Revisit any chapter, any time, from the tabs above.</p>
                <span class="door-arrow">→</span>
            </div>
            <div class="home-door" onclick="enterPractise()">
                <span class="door-kicker">Step 2 · repeat forever</span>
                <h4>Practise planning</h4>
                <p>Draw a fresh prompt, plan it in 7 minutes, get examiner-style AI feedback, then compare with a model plan. ${learnedAll ? 'You know the method — go.' : 'Best after finishing the chapters.'}</p>
                <span class="door-arrow">→</span>
            </div>`;
        playEntrance(board);

        const btn = el('masterContinueActionBtn');
        btn.innerText = learnedAll ? 'Practise planning ▶' : 'Start learning';
        btn.removeAttribute('disabled');
        btn.onclick = () => learnedAll ? enterPractise() : renderChapterMap();
    }

    function enterPractise() {
        mode = 'practise';
        renderNav();
        el('backChip').classList.remove('chip-visible');
        if (pState === 'plan' && currentPrompt && timerStarted && remainingSeconds > 0 && !feedbackReceived) {
            renderPlanScreen(true);
        } else {
            pState = 'draw';
            renderDrawScreen();
        }
    }

    function drawPrompt() {
        const unused = PRACTICE_BANK.filter(p => !usedPromptIds.includes(p.id));
        const pool = unused.length ? unused : PRACTICE_BANK;
        return pool[Math.floor(Math.random() * pool.length)];
    }

    function attemptStrip() {
        if (!attempts.length) return '';
        return `<div class="attempt-strip">` + attempts.map((a, i) =>
            `<span class="attempt-chip">Plan ${i + 1} · <b>${a.time}</b> · ${a.checks}/5${a.peeked ? ' · 👀' : ''}${a.coached ? ' · 🧑‍🏫' : ''}</span>`).join('') + `</div>`;
    }

    function renderDrawScreen() {
        pState = 'draw';
        setClockVisible(false);
        if (!currentPrompt || feedbackReceived) {
            currentPrompt = drawPrompt();
            studentPlanNotes = '';
            feedbackReceived = false;
            peekedThisAttempt = false;
            coachHistory = [];
            coachedThisAttempt = false;
            remainingSeconds = 420;
            timerStarted = false;
        }
        el('globalPromptBoxNode').style.display = 'none';
        el('headerWatermark').innerText = '▶';
        el('appStepBadge').innerText = 'Practise · Plan ' + (attempts.length + 1);
        el('appStepTitle').innerText = 'Draw a prompt';
        el('appStepSubtitle').innerText = 'A fresh question each time — like the real exam. You get 7 minutes on the clock once you start.';
        restartAnimation(el('stageHeaderBlock'));

        const board = el('visualDisplayBoard');
        board.innerHTML = `
            ${attemptStrip()}
            <div class="draw-card">
                <span class="topic-tag">${currentPrompt.topic}<span class="type-chip">${currentPrompt.qtype}</span></span>
                <p>${currentPrompt.prompt}</p>
            </div>
            <button class="redraw-btn" onclick="redraw()">🎲 Draw a different prompt</button>
            <div class="timer-hero" style="padding:8px 0 0 0;">
                <div class="big-clock" style="font-size:3rem;">7:00</div>
                <div class="clock-sub" style="margin-top:8px; font-size:0.88rem;">Note form only — the clock starts when you press the button.</div>
            </div>`;
        playEntrance(board);

        const btn = el('masterContinueActionBtn');
        btn.removeAttribute('disabled');
        btn.innerText = '▶ Start the 7-minute clock';
        btn.onclick = () => { renderPlanScreen(false); };
    }
    window.redraw = function () {
        currentPrompt = drawPrompt();
        renderDrawScreen();
    };

    function checklistHTML(p) {
        return `
            <div class="checklist-box" style="margin-bottom:10px;">
                <span class="checklist-title">Your plan must include</span>
                <ul>
                    <li id="chk_boundary"><span class="chk-icon">○</span> The boundary word</li>
                    <li id="chk_p1"><span class="chk-icon">○</span> P1 (${p.pillarA.label}): idea / reason / eg</li>
                    <li id="chk_p2"><span class="chk-icon">○</span> P2 (${p.pillarB.label}): idea / reason / eg</li>
                    <li id="chk_thesis"><span class="chk-icon">○</span> ${p.chk4}</li>
                    <li id="chk_concl"><span class="chk-icon">○</span> A conclusion note (restate stance)</li>
                </ul>
            </div>`;
    }

    function renderPlanScreen(resuming) {
        pState = 'plan';
        const p = currentPrompt;
        setClockVisible(true);
        renderClock();
        startTimer();
        el('globalPromptBoxNode').style.display = 'block';
        el('globalPromptBoxNode').innerHTML = `<b>📌 Prompt:</b> "${p.prompt}"`;
        el('headerWatermark').innerText = '✍';
        el('appStepBadge').innerText = 'Practise · Plan ' + (attempts.length + 1);
        el('appStepTitle').innerText = resuming ? 'Back to your plan' : 'Build your plan';
        el('appStepSubtitle').innerText = 'Notes only — abbreviations, arrows and fragments are exactly right.';
        restartAnimation(el('stageHeaderBlock'));

        const board = el('visualDisplayBoard');
        board.innerHTML = `
            ${checklistHTML(p)}
            <textarea class="console-editor-box" id="planInput" placeholder="Boundary: ...&#10;P1: idea / reason / eg ...&#10;P2: idea / reason / eg ...&#10;Thesis: while ...&#10;Concl: restate stance">${studentPlanNotes}</textarea>
            <div class="console-meta-row">
                <span id="planWordCount">0 words</span>
                <button class="peek-btn" onclick="openPeek()">👀 Peek at the method</button>
                <span>Aim for 30–45</span>
            </div>
            <button class="ai-feedback-btn" id="planFeedbackBtn" disabled onclick="requestPlanFeedback()">✨ Get AI feedback on my plan</button>
            <button class="ai-feedback-btn" style="background:#fff; color:var(--brand-orange-deep); border:1.5px solid var(--brand-orange); margin-top:8px;" onclick="askCoach()">🧑‍🏫 Coach me — ask me a guiding question</button>
            <div id="coachWrap"></div>
            <div id="planFeedbackPanel"></div>`;
        playEntrance(board);
        el('planInput').addEventListener('input', handlePlanInput);
        handlePlanInput();
        renderCoachUI();

        const btn = el('masterContinueActionBtn');
        btn.setAttribute('disabled', 'true');
        btn.innerText = 'Compare with a model plan';
        btn.onclick = renderCompareScreen;
    }

    function handlePlanInput() {
        studentPlanNotes = el('planInput').value;
        const lower = studentPlanNotes.toLowerCase();
        const p = currentPrompt;
        const wc = studentPlanNotes.trim().split(/\s+/).filter(w => w.length > 0).length;
        el('planWordCount').innerText = wc + ' words';
        setChk('chk_boundary', lower.includes(p.boundary.toLowerCase()));
        setChk('chk_p1', p.pillarA.keywords.some(k => lower.includes(k)));
        setChk('chk_p2', p.pillarB.keywords.some(k => lower.includes(k)));
        setChk('chk_thesis', (p.thesisWords || ['while', 'although', 'whereas', 'however']).some(w => lower.includes(w)));
        setChk('chk_concl', ['concl', 'conclusion', 'restate', 'stance'].some(w => lower.includes(w)));
        const fb = el('planFeedbackBtn');
        if (wc >= 25) fb.removeAttribute('disabled'); else fb.setAttribute('disabled', 'true');
    }
    function setChk(id, met) {
        const n = el(id);
        if (!n) return;
        n.classList.toggle('checked', met);
        n.querySelector('.chk-icon').innerText = met ? '✓' : '○';
    }
    function countChecks() {
        const lower = studentPlanNotes.toLowerCase();
        const p = currentPrompt;
        return [
            lower.includes(p.boundary.toLowerCase()),
            p.pillarA.keywords.some(k => lower.includes(k)),
            p.pillarB.keywords.some(k => lower.includes(k)),
            (p.thesisWords || ['while', 'although', 'whereas', 'however']).some(w => lower.includes(w)),
            ['concl', 'conclusion', 'restate', 'stance'].some(w => lower.includes(w))
        ].filter(Boolean).length;
    }

    const PEEK_SECTIONS = [
        { icon: '🎯', name: 'Decode', note: 'Boundary: ____', ch: 1, body: `Find the word that limits <b>who</b> or <b>what</b> the essay covers — before thinking of any ideas. Beware the decoy: a <b>position</b> answers "which side?", the boundary answers "who is this about?".` },
        { icon: '🧠', name: 'Loop Test', note: '(guards every reason)', ch: 2, body: `Every reason must add a <b>mechanism or fact</b> the claim didn't already contain. Same idea in new words = loop = no development marks. Caught one? Cross it out and ask <i>why</i> again.` },
        { icon: '🧱', name: 'Build ×2', note: 'P1: idea / reason / eg', ch: 3, body: `One idea per paragraph, three layers: <b>idea → reason → example</b>. Blank mind? Ask <b>why is it true?</b> (→ reason), then <b>how do I know?</b> (→ example). Examples need to be specific and believable — never statistics you don't have.` },
        { icon: '🧭', name: 'Thesis', note: 'Thesis: while X…, Y', ch: 4, body: `Name <b>both sides in the same words as your paragraphs</b>, plus your stance. "While" accepts the other view first, then hands the sentence to yours. Your position must be visible from the introduction onward.` },
        { icon: '✅', name: 'Conclude', note: 'Concl: restate stance', ch: 4, body: `Three words in the plan — but they guarantee your stance appears one final time. An essay without a conclusion is explicit band 6 wording.` }
    ];

    window.openPeek = function () {
        peekedThisAttempt = true;
        let typeNote = '';
        if (currentPrompt && currentPrompt.qtype && currentPrompt.qtype !== 'Discussion') {
            const q = QTYPES.find(t => t.name === currentPrompt.qtype);
            if (q) typeNote = `<div class="peek-typenote">This prompt is <b>${q.name}</b> — relabel the card: P1 = ${q.p1} · P2 = ${q.p2}</div>`;
        }
        el('peekContent').innerHTML = typeNote + PEEK_SECTIONS.map(s => `
            <div class="peek-section">
                <div class="peek-head" onclick="this.parentElement.classList.toggle('open')">
                    <span>${s.icon}</span><span>${s.name}</span>
                    <span class="pk-note">${s.note}</span><span class="pk-chev">›</span>
                </div>
                <div class="peek-body">${s.body}<br><button class="peek-more" onclick="peekJump(${s.ch})">Open chapter 0${s.ch + 1} →</button></div>
            </div>`).join('');
        el('peekBackdrop').classList.add('open');
        el('peekDrawer').classList.add('open');
    };
    window.peekJump = function (ch) { closePeek(); jumpToChapter(ch); };
    window.closePeek = function () { el('peekBackdrop').classList.remove('open'); el('peekDrawer').classList.remove('open'); };

    function renderCompareScreen() {
        pState = 'compare';
        pauseTimer();
        setClockVisible(false);
        const p = currentPrompt;
        const used = 420 - remainingSeconds;
        const usedStr = Math.floor(used / 60) + ':' + String(used % 60).padStart(2, '0');

        attempts.push({ time: usedStr, checks: countChecks(), peeked: peekedThisAttempt, coached: coachedThisAttempt, id: p.id });
        if (!usedPromptIds.includes(p.id)) usedPromptIds.push(p.id);

        el('globalPromptBoxNode').style.display = 'none';
        el('headerWatermark').innerText = '⇄';
        el('appStepBadge').innerText = 'Practise · Plan ' + attempts.length + ' complete';
        el('appStepTitle').innerText = 'Compare with a model';
        el('appStepSubtitle').innerText = 'Same prompt, planned by the method. Look for what the model includes that yours misses — and what you did just as well.';
        restartAnimation(el('stageHeaderBlock'));

        const board = el('visualDisplayBoard');
        board.innerHTML = `
            <div class="attempt-strip"><span class="attempt-chip">This plan: <b>${usedStr}</b> · ${countChecks()}/5 checklist${peekedThisAttempt ? ' · peeked 👀' : ''}${coachedThisAttempt ? ' · coached 🧑‍🏫' : ''}</span></div>
            <span class="compare-label">Your plan</span>
            <div class="note-pad" style="transform:none;"><div class="note-line" style="font-size:1.35rem; white-space:pre-wrap;">${studentPlanNotes.replace(/</g, '&lt;')}</div></div>
            <span class="compare-label">A model plan for this prompt</span>
            <div class="model-plan-card">
                <span class="note-tag">🎯</span><div class="note-line">${p.model.boundary}</div>
                <span class="note-tag">🧱</span><div class="note-line">${p.model.p1}</div>
                <span class="note-tag">🧱</span><div class="note-line">${p.model.p2}</div>
                <span class="note-tag">🧭</span><div class="note-line">${p.model.thesis}</div>
                <span class="note-tag">✅</span><div class="note-line">${p.model.concl}</div>
            </div>`;
        playEntrance(board);
        fireConfetti(14);

        feedbackReceived = true;
        const btn = el('masterContinueActionBtn');
        btn.removeAttribute('disabled');
        btn.innerText = '▶ Plan another prompt';
        btn.onclick = () => { renderDrawScreen(); };
    }

    const BACKEND_URL = 'https://ielts-planning-app.onrender.com';
    async function aiCall(system, messages, maxTokens) {
        const response = await fetch(BACKEND_URL + '/api/ielts-evaluator', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                systemInstruction: system,
                contents: messages,
                maxTokens: maxTokens
            })
        });

        if (!response.ok) {
            const errorPayload = await response.json().catch(() => ({}));
            throw new Error(errorPayload.message || 'Server connection exception.');
        }

        const data = await response.json();
        return data.reply || '';
    }

    window.requestPlanFeedback = async function () {
        pauseTimer();
        const p = currentPrompt;
        const panel = el('planFeedbackPanel');
        const btn = el('planFeedbackBtn');
        btn.setAttribute('disabled', 'true');
        panel.innerHTML = `<div class="ai-feedback-panel"><span class="spinner-dot"></span><span class="spinner-dot"></span><span class="spinner-dot"></span> Reading your plan like an examiner...</div>`;

        const systemPrompt = `You are an IELTS Writing examiner reviewing a student's PLANNING NOTES for a Task 2 essay, not the essay itself. The student had 7 minutes. Notes are EXPECTED to be short, abbreviated, note-form — fragments, arrows and abbreviations are correct planning technique; never criticise note-form style itself.

Essay prompt: "${p.prompt}"
Question type: ${p.qtype}. For this type, paragraph 1 should cover "${p.pillarA.label}" and paragraph 2 "${p.pillarB.label}". Check 4 for this type means: ${p.chk4}.

A reference model plan for this prompt (for your judgement only — do not require identical ideas, any valid ideas are fine):
${p.model.boundary}
${p.model.p1}
${p.model.p2}
${p.model.thesis}
${p.model.concl}

Assess five checks:
1. Boundary/scope noted (here: "${p.boundary}").
2. Paragraph 1 (${p.pillarA.label}): main idea + reason + one concrete example.
3. Paragraph 2 (${p.pillarB.label}): main idea + reason + one concrete example.
4. ${p.chk4}.
5. Conclusion note (restating stance).

Also run the Loop Test on their reasons: a reason must add a new mechanism or fact, not restate its claim in different words. A loop for this topic looks like: "${p.loopTrap}"

Write in clear English suited to an IELTS band 6.5–7 candidate. Under 150 words, plain text, no markdown headers or asterisks. Structure exactly:
Line 1-5: the five checks, each as "🟢", "🟠" or "🔴" followed by 3-6 words (e.g. "🟢 Boundary noted" / "🟠 P1 example too vague" / "🔴 No conclusion line").
Then "Fix this first:" — the single most important gap or loop-risk, quoting their actual notes.
Then "Next plan, focus on:" — one short instruction to carry into their next practice loop.
Be direct and specific, referencing their actual notes. No numeric band scores.`;

        try {
            const text = await aiCall(systemPrompt, [{ role: 'user', text: 'My plan notes:\n\n' + studentPlanNotes }], 600);
            panel.innerHTML = `<div class="ai-feedback-panel"><b>✨ Examiner feedback</b><br><br>${text || 'No feedback returned — try again.'}</div>`;
            el('masterContinueActionBtn').removeAttribute('disabled');
        } catch (err) {
            panel.innerHTML = `<div class="ai-feedback-panel">⚠️ Could not connect to the evaluation server. Please try again.</div>`;
        } finally {
            btn.removeAttribute('disabled');
            btn.innerText = '🔁 Get updated feedback';
        }
    };

    let coachHistory = [];
    let coachThinking = false;
    let coachedThisAttempt = false;
    
    function coachSystemPrompt() {
        const p = currentPrompt;
        return `You are a Socratic coach for IELTS Task 2 PLANNING (not essay writing). Speak simple, warm English for a band 6.5 student.

The exam prompt: "${p.prompt}" (type: ${p.qtype}; paragraph 1 should cover ${p.pillarA.label}, paragraph 2 ${p.pillarB.label}).
The student's current plan notes right now:
"""${studentPlanNotes || '(empty so far)'}"""

The method they follow — five note lines: 1) boundary word, 2) P1 idea/reason/example, 3) P2 idea/reason/example, 4) ${p.chk4}, 5) conclusion note. Reasons must pass the Loop Test: add a new mechanism or fact, never restate the claim in other words.

STRICT RULES for every reply:
- At most ONE short encouraging sentence, then exactly ONE guiding question. Nothing else.
- Aim the question at the weakest or most missing part of their current notes.
- NEVER write plan content, ideas, examples, or answers for them. Questions only.
- Never ask about more than one thing at once. Maximum 35 words in total.`;
    }
    
    function renderCoachUI() {
        const wrap = el('coachWrap');
        if (!wrap) return;
        if (!coachHistory.some(m => m.role === 'assistant') && !coachThinking) { wrap.innerHTML = ''; return; }
        let bubbles = coachHistory.filter(m => m.show !== false).map(m =>
            `<div class="coach-bubble ${m.role === 'assistant' ? 'cb-coach' : 'cb-student'}">${m.role === 'assistant' ? '🧑‍🏫 ' : ''}${m.text.replace(/</g, '&lt;')}</div>`).join('');
        if (coachThinking) bubbles += `<div class="coach-bubble cb-coach">🧑‍🏫 <span class="spinner-dot"></span><span class="spinner-dot"></span><span class="spinner-dot"></span></div>`;
        wrap.innerHTML = `<div class="coach-panel">${bubbles}
            <div class="coach-input-row">
                <input class="coach-input" id="coachInput" placeholder="Answer the coach — or just update your notes above">
                <button class="ai-feedback-btn coach-send" onclick="sendCoachReply()">↑</button>
            </div>
            <button class="peek-btn" style="margin-top:8px;" onclick="askCoach()">🔁 Ask me a different question</button>
        </div>`;
        const ci = el('coachInput');
        if (ci) ci.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.stopPropagation(); sendCoachReply(); } });
    }
    
    async function coachTurn(seedText, showSeed) {
        if (coachThinking) return;
        coachedThisAttempt = true;
        coachHistory.push({ role: 'user', text: seedText, show: !!showSeed });
        coachThinking = true;
        renderCoachUI();
        try {
            const q = await aiCall(coachSystemPrompt(), coachHistory.slice(-9).map(m => ({ role: m.role, text: m.text })), 150);
            coachHistory.push({ role: 'assistant', text: q || 'What is the boundary word in this prompt — who or what is it really about?' });
        } catch (err) {
            coachHistory.pop();
            coachHistory.push({ role: 'assistant', text: '⚠️ Connection to the coaching assistant failed. Please try again.' });
        } finally {
            coachThinking = false;
            renderCoachUI();
        }
    }
    window.askCoach = function () { coachTurn(coachHistory.length ? 'Ask me another question about a different part of my plan.' : 'Please ask me your first coaching question about my plan.', false); };
    window.sendCoachReply = function () {
        const ci = el('coachInput');
        const t = ci ? ci.value.trim() : '';
        if (!t) return;
        coachTurn(t, true);
    };

    function spawnSuccessRing(node) {
        try {
            if (getComputedStyle(node).position === 'static') node.style.position = 'relative';
            const s = document.createElement('span');
            s.className = 'success-ring';
            node.appendChild(s);
            setTimeout(() => s.remove(), 760);
        } catch (e) {}
    }
    document.addEventListener('pointermove', function (e) {
        const t = e.target.closest && e.target.closest('.tap-card, .home-door');
        if (!t) return;
        const r = t.getBoundingClientRect();
        t.style.setProperty('--mx', (e.clientX - r.left) + 'px');
        t.style.setProperty('--my', (e.clientY - r.top) + 'px');
    });
    document.addEventListener('pointerdown', function (e) {
        const b = e.target.closest && e.target.closest('.tactile-pill-btn, .ai-feedback-btn');
        if (!b || b.disabled) return;
        const r = b.getBoundingClientRect();
        const s = document.createElement('span');
        s.className = 'btn-ripple';
        const d = Math.max(r.width, r.height);
        s.style.width = s.style.height = d + 'px';
        s.style.left = (e.clientX - r.left - d / 2) + 'px';
        s.style.top = (e.clientY - r.top - d / 2) + 'px';
        b.appendChild(s);
        setTimeout(() => s.remove(), 650);
    });
    document.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter') return;
        const tag = (e.target && e.target.tagName || '').toLowerCase();
        if (tag === 'textarea' || tag === 'input') return;
        const btn = el('masterContinueActionBtn');
        if (btn && !btn.disabled) { e.preventDefault(); btn.click(); }
    });

    CHAPTERS = buildChapters();
    renderClock();
    renderHome();
</script>
</body>
</html>
