<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Exam Academy - IELTS Task 2 Writing: 7-Minute Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-orange: #F0923B;
            --brand-orange-deep: #d97b22;
            --brand-orange-wash: rgba(240,146,59,0.10);
            --brand-black: #171512;
            --paper: #fdfcfa;
            --paper-warm: #f7f4ef;
            --line: #e9e4dc;
            --line-strong: #d8d1c6;

            --text-main: #171512;
            --text-secondary: #5f594f;
            --text-muted: #97907f;

            --color-success: #1d7a3f;
            --color-success-light: #e9f5ee;
            --color-error: #c2402f;
            --color-error-light: #faeae6;
            --color-info-light: #f4f0e9;

            --note-bg: linear-gradient(180deg, #fffbee, #fff3d6);
            --note-border: #f0d894;
            --note-ink: #5b4300;

            --font-serif: 'Space Grotesk', 'Inter', sans-serif;
            --font-display: 'Inter', system-ui, sans-serif;
            --font-body: 'Inter', system-ui, sans-serif;
            --font-note: 'Caveat', cursive;

            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --glide: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * { box-sizing: border-box; }

        html { min-height: 100%; background: var(--paper-warm); }

        body {
            font-family: var(--font-body);
            margin: 0;
            padding: calc(14px + env(safe-area-inset-top)) 0 calc(16px + env(safe-area-inset-bottom)) 0;
            color: var(--text-main); line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column;
            background:
                radial-gradient(1000px 400px at 50% -10%, rgba(240,146,59,0.07), transparent 60%),
                var(--paper-warm);
        }

        .grain-overlay { position: fixed; inset: 0; z-index: 5; pointer-events: none; opacity: 0.045; mix-blend-mode: multiply; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }


        .app-container { width: 100%; max-width: 470px; margin: 0 auto; padding: 0 16px; flex-grow: 1; display: flex; flex-direction: column; }

        .workspace-card {
            background: var(--paper);
            padding: 0 30px 32px 30px;
            border: none;
            border-radius: 26px; display: flex; flex-direction: column; position: relative;
            flex: 1; min-height: 740px; overflow: hidden;
            box-shadow: 0 2px 6px rgba(23,21,18,0.03), 0 28px 80px -28px rgba(23,21,18,0.16);
            animation: cardIntro 0.7s var(--glide) both;
        }
        .phase-ribbon { height: 5px; margin: 0 -30px 0 -30px; background: var(--brand-orange); }

        /* ---------- Brand row ---------- */
        .brand-row { display: flex; align-items: center; gap: 10px; padding: 24px 44px 18px 0; border-bottom: 1px solid var(--line); margin-bottom: 18px; }
        .brand-square { width: 38px; height: 38px; flex-shrink: 0; filter: drop-shadow(0 5px 9px rgba(240,146,59,0.45)); }
        .brand-name { font-family: var(--font-serif); font-size: 0.8rem; font-weight: 500; color: var(--text-main); text-align: left; line-height: 1.12; letter-spacing: -0.02em; }
        .brand-name b { font-weight: 700; }
        .brand-tag { margin-left: auto; font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-muted); }

        .back-chip {
            position: absolute; top: 16px; right: 22px; z-index: 10;
            width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line-strong);
            background: #fff; color: var(--text-secondary); font-family: var(--font-display);
            font-size: 1.1rem; font-weight: 700; cursor: pointer; display: none;
            align-items: center; justify-content: center; line-height: 1; padding-bottom: 2px;
            transition: all 0.2s var(--spring);
        }
        .back-chip.chip-visible { display: flex; }
        .back-chip:hover { border-color: var(--brand-orange); color: var(--brand-orange); transform: translateX(-2px); }
        .back-chip:active { transform: scale(0.92); }

        /* ---------- Navigation tabs ---------- */
        .nav-rail { display: flex; gap: 0; width: 100%; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
        .nav-tab {
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 4px 2px 10px 2px; border: none; border-bottom: 3px solid transparent;
            background: transparent; transition: all 0.35s var(--glide); margin-bottom: -1px;
            cursor: pointer;
        }
        .nav-tab:hover .t-num, .nav-tab:hover .t-name { color: var(--brand-orange-deep); opacity: 1; }
        .nav-tab .t-num { font-family: var(--font-serif); font-size: 0.78rem; font-weight: 700; line-height: 1; color: var(--text-muted); opacity: 0.7; transition: all 0.3s ease; }
        .nav-tab .t-name { font-family: var(--font-display); font-size: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); transition: color 0.3s ease; }
        .nav-tab.done { border-bottom-color: var(--brand-orange); }
        .nav-tab.done .t-num, .nav-tab.done .t-name { color: var(--brand-orange); opacity: 1; }
        .nav-tab.active { border-bottom-color: var(--brand-black); }
        .nav-tab.active .t-num, .nav-tab.active .t-name { color: var(--brand-black); opacity: 1; }
        .nav-tab .t-dots { display: flex; gap: 3px; margin-top: 1px; min-height: 4px; }
        .nav-tab .t-dots i { width: 4px; height: 4px; border-radius: 1px; background: var(--line-strong); transition: all 0.3s var(--spring); }
        .nav-tab .t-dots i.on { background: var(--brand-orange); transform: scale(1.25); }
        .nav-tab.tab-practise { border-left: 1px solid var(--line); }
        .nav-tab.tab-practise .t-num { color: var(--brand-orange); opacity: 1; }
        .nav-tab.tab-practise.active { border-bottom-color: var(--brand-orange); }
        .nav-tab.tab-practise.active .t-name { color: var(--brand-orange-deep); }

        .clock-badge-pill { font-family: var(--font-display); font-weight: 700; color: var(--brand-orange-deep); font-size: 0.95rem; background: var(--brand-orange-wash); padding: 9px 16px; border-radius: 10px; border: 1px solid rgba(240,146,59,0.4); display: none; align-items: center; gap: 6px; white-space: nowrap; font-variant-numeric: tabular-nums; width: max-content; margin-left: auto; margin-bottom: 12px; }
        .clock-badge-pill.clock-visible { display: flex; margin: calc(8px + env(safe-area-inset-top)) auto 8px auto; animation: springIn 0.6s var(--spring) both; background: #fff; border: 1.5px solid var(--brand-orange); font-size: 1.05rem; padding: 9px 20px; }
        /* Scrolled past its row → dock as a small pill in the corner, out of the reading line. */
        .clock-badge-pill.clock-visible.clock-docked { position: fixed; top: calc(8px + env(safe-area-inset-top)); right: 10px; z-index: 60; margin: 0; font-size: 0.9rem; padding: 7px 13px; opacity: 0.95; animation: none; box-shadow: 0 10px 26px -10px rgba(23,21,18,0.4); }
        .clock-badge-pill.time-critical { color: var(--color-error); background: var(--color-error-light); border-color: rgba(194,64,47,0.4); animation: pulseSoft 1s infinite ease-in-out; }

        /* ---------- Header ---------- */
        .stage-header-block { position: relative; animation: canvasShift 0.55s var(--glide) both; }
        .step-mini-tag { font-family: var(--font-display); color: var(--brand-orange-deep); font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 6px; }
        .heading-main { font-family: var(--font-serif); font-size: 1.9rem; font-weight: 700; color: var(--text-main); margin: 0 0 9px 0; letter-spacing: -0.03em; line-height: 1.12; padding-right: 52px; }
        .subtext-narrative { font-size: 0.94rem; color: var(--text-secondary); margin-bottom: 22px; line-height: 1.65; font-weight: 450; }
        .header-watermark { position: absolute; top: -14px; right: -6px; font-family: var(--font-serif); font-size: 4.2rem; font-weight: 700; color: var(--brand-orange); opacity: 0.12; pointer-events: none; line-height: 1; }
        .header-watermark .ico { font-size: 3.2rem; opacity: 0.6; }

        .persistent-prompt-anchor-box {
            background: var(--paper-warm); border: 1px solid var(--line);
            border-left: 4px solid var(--brand-orange); border-radius: 12px;
            padding: 13px 16px; margin-bottom: 14px; text-align: left; font-size: 0.84rem; font-weight: 450; color: var(--text-secondary); line-height: 1.55;
        }
        .persistent-prompt-anchor-box b { color: var(--text-main); font-weight: 700; }

        .viewport-canvas { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; margin-bottom: 12px; overflow-y: auto; }
        .viewport-canvas.canvas-shift { animation: canvasShift 0.6s var(--glide) both; }

        /* ---------- Home doors ---------- */
        .home-door { border-radius: 18px; padding: 20px 22px; cursor: pointer; text-align: left; margin-bottom: 12px; transition: all 0.2s var(--spring); position: relative; overflow: hidden; animation: zoomFocus 0.7s var(--glide) both; }
        .home-door:nth-child(2) { animation-delay: 0.12s; }
        .home-door:hover { transform: translateY(-3px); box-shadow: 0 16px 34px -16px rgba(240,146,59,0.55); }
        .home-door:active { transform: scale(0.99); }
        .home-door .hd-top { display: flex; align-items: center; gap: 13px; margin-bottom: 11px; }
        .home-door .hd-ico { width: 46px; height: 46px; border-radius: 13px; background: var(--brand-orange); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.35rem; flex-shrink: 0; box-shadow: 0 8px 18px -8px rgba(240,146,59,0.7); }
        .home-door .door-kicker { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.13em; color: var(--brand-orange-deep); display: block; margin-bottom: 3px; }
        .home-door h4 { font-family: var(--font-serif); font-size: 1.35rem; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
        .home-door p { margin: 0 0 15px 0; font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; }
        .home-door .hd-cta { display: inline-block; font-family: var(--font-display); font-size: 0.8rem; font-weight: 800; color: #fff; background: var(--brand-orange); padding: 10px 20px; border-radius: 999px; box-shadow: 0 8px 18px -8px rgba(240,146,59,0.7); transition: background 0.2s ease; }
        .home-door:hover .hd-cta { background: var(--brand-orange-deep); }
        .door-learn { background: var(--brand-orange-wash); border: 1px solid rgba(240,146,59,0.45); }
        .door-practise { background: #ffffff; border: 1.5px solid var(--brand-black); }
        .door-practise .hd-ico { background: var(--brand-black); box-shadow: 0 8px 18px -8px rgba(23,21,18,0.5); }

        /* ---------- Class-code banner ---------- */
        .class-banner { margin-top: 14px; background: var(--paper-warm); border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; }
        .class-banner.joined { display: flex; align-items: center; gap: 12px; background: var(--color-success-light); border-color: #c4e0cf; }
        .cb-collapsed { display: flex; align-items: center; gap: 12px; }
        .class-banner .cb-ico { width: 34px; height: 34px; border-radius: 9px; background: var(--brand-orange); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
        .class-banner.joined .cb-ico { background: var(--color-success); }
        .cb-body { flex: 1; line-height: 1.35; }
        .cb-body b { font-family: var(--font-display); font-size: 0.86rem; font-weight: 800; display: block; }
        .cb-body span { font-size: 0.76rem; color: var(--text-secondary); }
        .cb-open { font-family: var(--font-display); font-size: 0.78rem; font-weight: 800; color: #fff; background: var(--brand-orange); border: none; border-radius: 999px; padding: 9px 16px; cursor: pointer; flex-shrink: 0; }
        .cb-x { background: none; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; line-height: 1; padding: 0 4px; flex-shrink: 0; }
        .cb-form { display: flex; gap: 8px; flex-wrap: wrap; }
        .cb-form input { flex: 1; min-width: 120px; padding: 10px 12px; border: 1.5px solid var(--line-strong); border-radius: 10px; font-family: var(--font-body); font-size: 0.9rem; outline: none; }
        .cb-form input:focus { border-color: var(--brand-orange); }
        .cb-form button { font-family: var(--font-display); font-weight: 800; color: #fff; background: var(--brand-orange); border: none; border-radius: 10px; padding: 10px 20px; cursor: pointer; }

        /* ---------- Reveal / theory ---------- */
        .focus-beat { animation: zoomFocus 0.85s var(--glide) both; margin-bottom: 11px; }
        .focus-beat.beat-rest { opacity: 0.45; transform: scale(0.97); transition: opacity 0.6s ease, transform 0.6s ease; }

        .theory-stmt {
            background: #ffffff; border: 1px solid var(--line); border-left: 4px solid var(--brand-orange);
            border-radius: 14px; padding: 21px 23px; text-align: left;
            font-size: 1.06rem; font-weight: 450; line-height: 1.68; color: var(--text-main);
            box-shadow: 0 8px 24px -14px rgba(23,21,18,0.14);
        }
        .theory-stmt b { color: var(--brand-orange-deep); font-weight: 700; }
        .theory-stmt .stmt-tag { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.13em; color: var(--brand-orange-deep); display: block; margin-bottom: 10px; }
        .theory-quote { background: transparent; border-left: 3px solid var(--line-strong); padding: 6px 0 6px 18px; font-family: var(--font-serif); font-size: 1.05rem; font-weight: 600; color: var(--text-secondary); line-height: 1.6; text-align: left; }
        .theory-quote .q-source { display: block; font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-top: 10px; }

        .focus-card {
            background: #ffffff; border: 1px solid var(--line);
            border-radius: 14px; padding: 20px; margin-bottom: 10px; text-align: left;
            box-shadow: 0 8px 24px -14px rgba(23,21,18,0.12);
            animation: zoomFocus 0.8s var(--glide) both;
        }
        .focus-card .focus-tag { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.13em; color: var(--brand-orange-deep); display: block; margin-bottom: 9px; }
        .focus-card p { margin: 0; font-size: 0.99rem; font-weight: 450; line-height: 1.68; color: var(--text-main); }
        .focus-card p b { font-weight: 700; }

        .laser-prompt-frame {
            background: #ffffff; border: 1px solid var(--line); border-radius: 14px; padding: 19px;
            font-size: 1.1rem; font-weight: 600; color: var(--text-main); text-align: left; line-height: 1.85; font-family: var(--font-serif);
            margin-bottom: 10px;
        }
        .text-word-token { padding: 2px 9px; border-radius: 8px; background: var(--paper-warm); color: var(--text-secondary); display: inline-block; margin: 2px 0; }
        .tap-token { cursor: pointer; transition: all 0.18s var(--spring); border: 1.5px dashed var(--line-strong); }
        .tap-token:hover { transform: translateY(-2px) scale(1.04); border-color: var(--brand-orange); background: var(--brand-orange-wash); color: var(--text-main); }
        .tap-token:active { transform: scale(0.96); }
        .tap-token.tap-right { background: var(--brand-orange); color: #fff !important; border: 1.5px solid var(--brand-orange-deep); animation: tapRight 0.5s var(--spring); pointer-events: none; }
        .tap-token.tap-wrong { animation: shakeQuick 0.4s ease; background: var(--color-error-light); color: var(--color-error); border-color: rgba(194,64,47,0.5); }

        .tap-instruction { font-family: var(--font-display); font-size: 0.82rem; font-weight: 700; color: var(--brand-orange-deep); text-align: center; margin-bottom: 13px; text-transform: uppercase; letter-spacing: 0.1em; animation: pulseNudge 2s ease-in-out infinite; }

        .tap-card { background: #ffffff; border: 1px solid var(--line); border-radius: 14px; padding: 17px 19px; margin-bottom: 10px; cursor: pointer; text-align: left; font-size: 0.97rem; font-weight: 500; line-height: 1.62; transition: all 0.18s var(--spring); animation: zoomFocus 0.7s var(--glide) both; color: var(--text-main); box-shadow: 0 2px 8px -4px rgba(23,21,18,0.08); position: relative; overflow: hidden; }
        .tap-card:hover { border-color: var(--brand-orange); transform: translateY(-2px); box-shadow: 0 10px 24px -12px rgba(240,146,59,0.5); }
        .tap-card:active { transform: scale(0.98); }
        .tap-card.tap-right { border-color: var(--brand-orange); background: var(--brand-orange-wash); color: var(--brand-orange-deep); font-weight: 700; animation: tapRight 0.5s var(--spring); pointer-events: none; }
        .tap-card.tap-wrong { animation: shakeQuick 0.4s ease; border-color: rgba(194,64,47,0.5); background: var(--color-error-light); color: var(--color-error); }
        .tap-card.tap-dim { opacity: 0.35; pointer-events: none; }

        /* Decode chapter: the boundary and decoy light up in sequence */
        @keyframes markBoundary { 0% { background: var(--paper-warm); color: var(--text-secondary); transform: scale(1); } 60% { transform: scale(1.14); } 100% { background: var(--brand-orange); color: #fff; transform: scale(1); } }
        @keyframes markDecoy { 0% { background: var(--paper-warm); color: var(--text-secondary); transform: scale(1); } 60% { transform: scale(1.14); } 100% { background: var(--brand-black); color: #fff; transform: scale(1); } }
        .tok-anim-boundary { display: inline-block; font-weight: 700; animation: markBoundary 0.7s var(--spring) 1.2s both; }
        .tok-anim-decoy { display: inline-block; font-weight: 700; animation: markDecoy 0.7s var(--spring) 2.6s both; }

        .hl-red { background: #f9ded8; color: #9c3325; padding: 1px 7px; border-radius: 6px; font-weight: 700; }
        .hl-green { background: #ddeee3; color: #14532d; padding: 1px 7px; border-radius: 6px; font-weight: 700; }
        .hl-purple { background: #f6e3cd; color: #a05a10; padding: 1px 7px; border-radius: 6px; font-weight: 700; }

        .verdict-stamp { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 26px; border: 3px solid; border-radius: 10px; width: max-content; margin: 6px auto 14px auto; transform: rotate(-3deg); animation: stampIn 0.7s var(--spring) 0.4s both; }
        .verdict-stamp.stamp-bad { color: var(--color-error); border-color: var(--color-error); background: var(--color-error-light); }
        .verdict-stamp.stamp-good { color: var(--color-success); border-color: var(--color-success); background: var(--color-success-light); }

        .verdict-card { border-radius: 14px; padding: 17px 19px; margin-bottom: 10px; text-align: left; font-size: 0.97rem; font-weight: 450; line-height: 1.66; animation: zoomFocus 0.8s var(--glide) both; }
        .verdict-card.v-good { background: var(--color-success-light); border: 1px solid #c4e0cf; color: #14532d; }
        .verdict-card.v-bad { background: var(--color-error-light); border: 1px solid #eccdc5; color: #8c2e21; }
        .verdict-card.v-info { background: var(--color-info-light); border: 1px solid var(--line-strong); color: var(--text-main); }
        .verdict-card b { font-weight: 700; }

        /* ---------- Note form & model card ---------- */
        /* Minimalist inline icon */
        .ico { display: inline-flex; align-items: center; justify-content: center; vertical-align: -0.12em; }
        .ico svg { width: 1em; height: 1em; display: block; }

        .note-pad { background: linear-gradient(180deg, #fffdf6, #fef8e9); border: 1px solid var(--note-border); border-radius: 14px; padding: 16px 20px; margin-bottom: 10px; text-align: left; box-shadow: 0 12px 30px -18px rgba(200,160,60,0.45); animation: zoomFocus 0.8s var(--glide) both; position: relative; }
        .note-pad .note-tag { font-family: var(--font-display); font-size: 0.64rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--brand-orange-deep); display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
        .note-pad .note-tag .ico { font-size: 0.95rem; color: var(--brand-orange); }
        .note-pad .note-line { font-family: var(--font-note); font-size: 1.6rem; font-weight: 700; color: var(--note-ink); line-height: 1.3; }
        .note-pad .note-line + .note-tag { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(200,160,60,0.22); }
        .note-pad .note-line.line-locked { opacity: 0.22; }
        .note-pad .note-line.line-new { animation: zoomFocus 0.8s var(--glide) 0.3s both; }

        .sentence-to-compress { position: relative; transition: all 0.6s ease; }
        .sentence-to-compress.compressed { opacity: 0.35; transform: scale(0.97); text-decoration: line-through; text-decoration-color: rgba(194,64,47,0.6); text-decoration-thickness: 2px; }
        .compress-arrow { text-align: center; font-size: 1.35rem; margin: 4px 0 10px 0; animation: zoomFocus 0.6s var(--glide) both; color: var(--brand-orange); font-family: var(--font-display); font-weight: 800; }

        .word-count-callout { font-family: var(--font-display); text-align: center; font-size: 0.85rem; font-weight: 700; color: var(--brand-orange-deep); background: var(--brand-orange-wash); border: 1px solid rgba(240,146,59,0.35); border-radius: 10px; padding: 12px 15px; margin-top: 2px; animation: zoomFocus 0.7s var(--glide) 0.45s both; letter-spacing: 0.02em; }

        /* ---------- Criteria map (4 × 25%) ---------- */
        .crit-map { display: flex; gap: 5px; margin-bottom: 10px; animation: zoomFocus 0.8s var(--glide) both; }
        .crit-block { flex: 1; border-radius: 12px; padding: 15px 6px; text-align: center; font-family: var(--font-display); }
        .crit-block .cb-pct { font-family: var(--font-serif); font-size: 1.3rem; font-weight: 700; display: block; }
        .crit-block .cb-label { font-size: 0.54rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-top: 3px; line-height: 1.35; }
        .crit-block.cb-plan { background: var(--brand-orange); color: #fff; box-shadow: 0 8px 20px -8px rgba(240,146,59,0.6); }
        .crit-block.cb-lang { background: var(--paper-warm); color: var(--text-secondary); border: 1px solid var(--line); }
        /* Two focus-criteria cards (chapter 01) */
        .crit-two { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }
        .crit-card { background: #fff; border: 1px solid var(--line); border-left: 4px solid var(--brand-orange); border-radius: 0 14px 14px 0; padding: 15px 17px; animation: springIn 0.55s var(--spring) both; }
        .crit-card:nth-child(2) { animation-delay: 0.12s; }
        .crit-card-tag { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-display); font-size: 0.66rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brand-orange-deep); }
        .crit-card-tag .ico { color: var(--brand-orange); font-size: 0.95rem; }
        .crit-card-plain { font-family: var(--font-serif); font-size: 1.08rem; font-weight: 700; color: var(--text-main); margin: 7px 0 5px; }
        .crit-card p { margin: 0; font-size: 0.9rem; line-height: 1.55; color: var(--text-secondary); }
        .crit-card p b { color: var(--text-main); }
        .crit-legend { display: flex; gap: 5px; margin-bottom: 12px; font-family: var(--font-display); font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; animation: zoomFocus 0.7s var(--glide) 0.2s both; }
        .crit-legend span { flex: 1; text-align: center; }
        .crit-legend .cl-plan { color: var(--brand-orange-deep); }
        .crit-legend .cl-lang { color: var(--text-muted); }

        .reveal-after { display: none; }
        .reveal-after.shown { display: block; animation: zoomFocus 0.5s var(--glide) both; }

        .tok-boundary { background: var(--brand-orange); color: #fff !important; font-weight: 700; }
        .tok-decoy { background: var(--brand-black); color: #fff !important; font-weight: 700; }

        /* ---------- 40-minute map ---------- */
        .time-map { display: flex; gap: 4px; margin-bottom: 12px; animation: zoomFocus 0.8s var(--glide) both; }
        .time-block { border-radius: 10px; padding: 12px 6px; text-align: center; font-family: var(--font-display); }
        .time-block .tb-min { font-family: var(--font-serif); font-size: 1.15rem; font-weight: 700; display: block; }
        .time-block .tb-label { font-size: 0.56rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-top: 2px; }
        .time-block.tb-read { flex: 3; background: var(--paper-warm); color: var(--text-secondary); }
        .time-block.tb-plan { flex: 7; background: var(--brand-orange); color: #fff; box-shadow: 0 8px 20px -8px rgba(240,146,59,0.6); }
        .time-block.tb-write { flex: 22; background: #ffffff; border: 1px solid var(--line); color: var(--text-main); }
        .time-block.tb-check { flex: 3; background: var(--paper-warm); color: var(--text-secondary); }

        /* ---------- Stage rail (7-minute walk-through) ---------- */
        .rail-clock { font-family: var(--font-serif); font-size: 2.6rem; font-weight: 700; text-align: center; color: var(--brand-orange-deep); margin: 2px 0 14px; letter-spacing: 0.02em; }
        .stage-rail { display: flex; flex-direction: column; gap: 0; margin-bottom: 14px; }
        .rail-item { display: flex; align-items: center; gap: 14px; padding: 9px 4px; opacity: 0; animation: springIn 0.55s var(--spring) both; animation-delay: var(--rd, 0s); }
        .rail-dot { width: 40px; height: 40px; border-radius: 50%; background: var(--brand-orange-wash); border: 1.5px solid var(--brand-orange); color: var(--brand-orange-deep); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .rail-dot .ico { font-size: 1.25rem; }
        .rail-name { font-family: var(--font-serif); font-size: 1.02rem; font-weight: 700; flex: 1; }
        .rail-min { font-family: var(--font-display); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); background: var(--paper-warm); border-radius: 999px; padding: 4px 11px; }
        .rail-link { width: 2px; height: 12px; background: var(--line-strong); margin-left: 23px; opacity: 0; animation: zoomFocus 0.4s ease both; animation-delay: var(--rd, 0s); }
        .rail-total { text-align: center; font-family: var(--font-display); font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); margin-top: 6px; opacity: 0; animation: zoomFocus 0.6s var(--glide) both; animation-delay: var(--rd, 0s); }

        /* ---------- Planned vs unplanned contrast ---------- */
        .vs-intro { font-size: 0.86rem; color: var(--text-secondary); line-height: 1.55; margin-bottom: 12px; background: var(--paper-warm); border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px; animation: zoomFocus 0.5s var(--glide) both; }
        .vs-intro b { color: var(--text-main); }
        .vs-key { display: flex; flex-wrap: wrap; gap: 4px 10px; margin-bottom: 10px; font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-secondary); }
        .vs-key span { display: inline-flex; align-items: center; white-space: nowrap; }
        .vs-key i { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 4px; }
        .vs-verdict { margin-top: 9px; padding-top: 8px; border-top: 1px dashed; font-family: var(--font-display); font-size: 0.66rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1.4; }
        .vv-good { color: var(--color-success); } .vv-bad { color: var(--color-error); }
        .vs-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
        .vs-col { flex: 1; border-radius: 14px; padding: 14px; animation: springIn 0.6s var(--spring) both; }
        .vs-scale { display: flex; justify-content: space-between; font-family: var(--font-display); font-size: 0.58rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 5px; }
        .vs-col.vs-good { background: var(--color-success-light); border: 1px solid #c9e6d4; }
        .vs-col.vs-bad { background: var(--color-error-light); border: 1px solid #f0cfc7; animation-delay: 0.25s; }
        .vs-head { font-family: var(--font-display); font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; display: block; margin-bottom: 9px; }
        .vs-good .vs-head { color: var(--color-success); }
        .vs-bad .vs-head { color: var(--color-error); }
        .vs-bar { display: flex; gap: 2px; height: 32px; border-radius: 7px; overflow: hidden; }
        .vs-seg { font-family: var(--font-display); font-size: 0.56rem; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; overflow: hidden; }
        .vs-outcome { font-size: 0.85rem; line-height: 1.45; color: var(--text-secondary); }
        .vs-outcome b { color: var(--text-main); }
        .vs-chain { list-style: none; margin: 0; padding: 0; counter-reset: vc; }
        .vs-chain li { position: relative; padding: 5px 0 5px 24px; font-size: 0.8rem; line-height: 1.35; color: var(--text-secondary); counter-increment: vc; }
        .vs-chain li b { color: var(--text-main); }
        .vs-chain li::before { content: counter(vc); position: absolute; left: 0; top: 4px; width: 16px; height: 16px; border-radius: 50%; font-family: var(--font-display); font-size: 0.6rem; font-weight: 800; display: flex; align-items: center; justify-content: center; color: #fff; }
        .vs-chain li:not(:last-child)::after { content: ''; position: absolute; left: 7.5px; top: 20px; width: 1px; height: calc(100% - 12px); background: currentColor; opacity: 0.28; }
        .vc-good li { color: #2f6b45; } .vc-good li::before { background: var(--color-success); }
        .vc-bad li { color: #9a3527; } .vc-bad li::before { background: var(--color-error); }

        /* ---------- Five-types animated showcase (ch 01) ---------- */
        .type-show { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 20px; margin-bottom: 12px; min-height: 156px; box-shadow: 0 14px 34px -22px rgba(23,21,18,0.22); }
        .type-show.ts-in { animation: springIn 0.45s var(--spring) both; }
        .ts-badge { display: inline-block; font-family: var(--font-display); font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.09em; color: #fff; background: var(--brand-orange); padding: 5px 11px; border-radius: 999px; margin-bottom: 13px; }
        .ts-q { font-family: var(--font-serif); font-size: 1.04rem; line-height: 1.52; color: var(--text-main); }
        .cue-hl { background: var(--brand-orange-wash); color: var(--brand-orange-deep); font-weight: 700; border-radius: 4px; padding: 1px 4px; -webkit-box-decoration-break: clone; box-decoration-break: clone; }
        .ts-relabel { margin-top: 14px; font-family: var(--font-display); font-size: 0.78rem; font-weight: 700; color: var(--text-secondary); background: var(--paper-warm); border-radius: 9px; padding: 9px 12px; text-align: center; }
        .ts-dots { display: flex; gap: 7px; justify-content: center; margin-bottom: 12px; }
        .ts-dots i { width: 7px; height: 7px; border-radius: 50%; background: var(--line-strong); cursor: pointer; transition: all 0.3s var(--spring); }
        .ts-dots i.on { background: var(--brand-orange); transform: scale(1.35); }

        /* ---------- Type filter chips (draw screen) ---------- */
        .tf-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .tf-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        .tf-label { font-family: var(--font-display); font-size: 0.64rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-right: 2px; }
        .tf-chip { font-family: var(--font-display); font-size: 0.74rem; font-weight: 700; padding: 8px 4px; text-align: center; border-radius: 999px; border: 1.5px solid var(--line-strong); background: #fff; color: var(--text-secondary); cursor: pointer; transition: all 0.2s var(--glide); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tf-chip:hover { border-color: var(--brand-orange); color: var(--brand-orange-deep); }
        .tf-chip.sel { background: var(--brand-orange); border-color: var(--brand-orange); color: #fff; box-shadow: 0 6px 16px -8px rgba(240,146,59,0.7); }

        /* ---------- Type coverage (progress) ---------- */
        .tcov-row { display: flex; gap: 7px; margin-bottom: 12px; flex-wrap: wrap; }
        .tcov-chip { flex: 1; min-width: 86px; border: 1.5px solid var(--line); border-radius: 12px; padding: 10px 8px; text-align: center; cursor: pointer; background: #fff; animation: springIn 0.5s var(--spring) both; transition: border-color 0.2s; }
        .tcov-chip:hover { border-color: var(--brand-orange); }
        .tcov-chip.done { background: var(--color-success-light); border-color: #c9e6d4; }
        .tcov-chip .tc-n { display: block; font-family: var(--font-serif); font-size: 1.15rem; font-weight: 700; }
        .tcov-chip.done .tc-n { color: var(--color-success); }
        .tcov-chip .tc-name { display: block; font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-top: 2px; }

        /* ---------- "Why this works" expander ---------- */
        .why-exp { border: 1.5px dashed var(--line-strong); border-radius: 12px; margin: 4px 0 10px; overflow: hidden; background: transparent; }
        .why-exp .we-head { padding: 11px 15px; cursor: pointer; font-family: var(--font-display); font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .why-exp .we-head .we-chev { transition: transform 0.25s var(--glide); font-size: 1rem; }
        .why-exp.open .we-head .we-chev { transform: rotate(90deg); }
        .why-exp.open .we-head { color: var(--brand-orange-deep); }
        .why-exp .we-body { display: none; padding: 0 15px 13px; }
        .why-exp.open .we-body { display: block; animation: zoomFocus 0.4s var(--glide) both; }
        .why-exp .we-body .theory-stmt, .why-exp .we-body .theory-quote { margin-bottom: 8px; animation: none; opacity: 1; }

        /* ---------- Slots ---------- */
        .layer-slot {
            border: 1.5px dashed var(--line-strong); border-radius: 12px; padding: 14px 17px; margin-bottom: 8px;
            display: flex; gap: 12px; align-items: flex-start; text-align: left;
            font-size: 0.94rem; font-weight: 450; color: var(--text-muted); min-height: 52px;
        }
        .layer-slot .slot-icon { font-size: 1.1rem; flex-shrink: 0; opacity: 0.4; }
        .layer-slot .slot-label { font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; display: block; margin-bottom: 3px; }
        .layer-slot.filled { border: 1px solid var(--line); background: #ffffff; color: var(--text-main); box-shadow: 0 6px 18px -10px rgba(23,21,18,0.15); border-left: 4px solid var(--brand-orange); }
        .layer-slot.filled .slot-icon { opacity: 1; }
        .layer-slot.filled .slot-label { color: var(--brand-orange-deep); }
        .layer-slot.just-filled { animation: slotFill 0.7s var(--spring) both; }
        .layer-slot.just-filled .slot-icon { animation: iconPop 0.6s var(--spring) 0.2s both; }

        .side-chip-row { display: flex; gap: 8px; margin-bottom: 10px; justify-content: center; }
        .side-chip-row .tap-card { flex: 1; text-align: center; margin-bottom: 0; }
        .side-chip { flex: 1; border-radius: 12px; padding: 16px; text-align: left; font-size: 0.9rem; font-weight: 500; line-height: 1.6; animation: zoomFocus 0.8s var(--glide) both; }
        .side-chip .sc-tag { font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; display: block; margin-bottom: 6px; }
        .side-chip.sc-a { background: var(--brand-orange-wash); border: 1px solid rgba(240,146,59,0.4); color: #8a4d0a; }
        .side-chip.sc-a .sc-tag { color: var(--brand-orange-deep); }
        .side-chip.sc-b { background: var(--paper-warm); border: 1px solid var(--line-strong); color: var(--text-main); }
        .side-chip.sc-b .sc-tag { color: var(--text-secondary); }

        .checklist-box { background: #ffffff; border: 1px solid var(--line); border-left: 4px solid var(--brand-orange); border-radius: 12px; padding: 16px 18px; margin-top: 2px; animation: zoomFocus 0.7s var(--glide) both; }
        .checklist-title { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.13em; color: var(--brand-orange-deep); display: block; margin-bottom: 10px; }
        .checklist-box ul { margin: 0; padding: 0; list-style: none; font-size: 0.92rem; font-weight: 500; color: var(--text-main); }
        .checklist-box li { margin-bottom: 8px; display: flex; align-items: flex-start; gap: 9px; transition: all 0.25s ease; }
        .checklist-box li:last-child { margin-bottom: 0; }
        .checklist-box li .chk-icon { font-weight: 800; color: var(--text-muted); flex-shrink: 0; }
        .checklist-box li.checked { color: var(--color-success); }
        .checklist-box li.checked .chk-icon { color: var(--color-success); animation: iconPop 0.55s var(--spring); }

        /* ---------- Practise ---------- */
        .timer-hero { text-align: center; padding: 28px 0 12px 0; }
        .timer-hero .big-clock { font-family: var(--font-serif); font-size: 5rem; font-weight: 700; color: var(--brand-orange); line-height: 1; animation: clockBreath 1.6s ease-in-out infinite; font-variant-numeric: tabular-nums; }
        .timer-hero .clock-sub { font-size: 0.98rem; font-weight: 450; color: var(--text-secondary); margin-top: 16px; line-height: 1.7; }
        .timer-hero .clock-sub b { color: var(--text-main); font-weight: 700; }

        .draw-card { background: #ffffff; border: 1px solid var(--line); border-radius: 16px; padding: 24px; text-align: left; margin-bottom: 12px; box-shadow: 0 8px 24px -14px rgba(23,21,18,0.12); animation: zoomFocus 0.7s var(--glide) both; }
        .draw-card .topic-tag { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.13em; color: var(--brand-orange-deep); display: block; margin-bottom: 10px; }
        .draw-card p { margin: 0; font-family: var(--font-serif); font-size: 1.15rem; font-weight: 600; color: var(--text-main); line-height: 1.6; }
        .redraw-btn { font-family: var(--font-display); background: transparent; border: 1px solid var(--line-strong); color: var(--text-secondary); font-size: 0.82rem; font-weight: 700; padding: 12px 10px; border-radius: 12px; cursor: pointer; transition: all 0.2s var(--spring); width: 100%; margin-bottom: 8px; }
        .redraw-row { display: flex; gap: 8px; }
        .weakspot-card { display: flex; align-items: center; gap: 12px; margin-top: 10px; padding: 13px 15px; border-radius: 14px; background: var(--brand-orange-wash); border: 1.5px solid var(--brand-orange); cursor: pointer; text-align: left; transition: all 0.2s var(--spring); }
        .weakspot-card:hover { transform: translateY(-2px); box-shadow: 0 14px 30px -16px rgba(240,146,59,0.6); }
        .weakspot-card:active { transform: scale(0.99); }
        .weakspot-card .ws-ico { width: 38px; height: 38px; border-radius: 11px; background: var(--brand-orange); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; box-shadow: 0 7px 16px -7px rgba(240,146,59,0.8); }
        .weakspot-card .ws-body { flex: 1; }
        .weakspot-card .ws-title { font-family: var(--font-display); font-size: 0.9rem; font-weight: 800; color: var(--brand-orange-deep); }
        .weakspot-card .ws-sub { font-size: 0.76rem; line-height: 1.45; color: var(--text-secondary); margin-top: 2px; }
        .weakspot-card .ws-arrow { font-family: var(--font-serif); font-size: 1.3rem; color: var(--brand-orange); flex-shrink: 0; }

        /* ---------- Straight-to-writing shortcut card ---------- */
        .skip-write-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 16px; font-family: var(--font-display); font-size: 0.82rem; font-weight: 700; color: var(--brand-orange-deep); background: transparent; border: 1px dashed var(--brand-orange); border-radius: 12px; padding: 12px; cursor: pointer; transition: all 0.2s var(--spring); }
        .skip-write-btn:hover { background: var(--brand-orange-wash); }
        .skip-write-btn .ico { font-size: 0.95rem; }

        /* ---------- Chapter objective (intro) screen ---------- */
        .chapter-intro { animation: zoomFocus 0.6s var(--glide) both; }
        .ci-kicker { font-family: var(--font-display); font-size: 0.64rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--brand-orange-deep); display: block; margin-bottom: 12px; }
        .ci-goal { font-family: var(--font-serif); font-size: 1.28rem; font-weight: 700; line-height: 1.4; color: var(--text-main); letter-spacing: -0.01em; margin-bottom: 22px; }
        .ci-mark { background: var(--brand-orange-wash); border: 1px solid rgba(240,146,59,0.35); border-radius: 14px; padding: 15px 17px; margin-bottom: 20px; animation: springIn 0.6s var(--spring) both; }
        .ci-mark-tag { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-display); font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--brand-orange-deep); margin-bottom: 8px; }
        .ci-mark-tag .ico { color: var(--brand-orange); }
        .ci-purpose { margin: 0 0 10px 0; font-size: 1rem; line-height: 1.55; color: var(--text-main); font-weight: 500; }
        .ci-mark-pill { display: inline-block; font-family: var(--font-display); font-size: 0.66rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #fff; background: var(--brand-orange); padding: 5px 12px; border-radius: 999px; }
        .ci-label { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); display: block; margin-bottom: 12px; }
        .ci-list { list-style: none; margin: 0; padding: 0; }
        .ci-list li { display: flex; align-items: flex-start; gap: 11px; padding: 11px 14px; background: #fff; border: 1px solid var(--line); border-radius: 12px; margin-bottom: 8px; font-size: 0.95rem; line-height: 1.5; color: var(--text-main); animation: springIn 0.5s var(--spring) both; }
        .ci-list li:nth-child(2) { animation-delay: 0.08s; } .ci-list li:nth-child(3) { animation-delay: 0.16s; }
        .ci-list li .ico { color: var(--brand-orange); flex-shrink: 0; margin-top: 2px; font-size: 1rem; }

        /* ---------- Relaxed / exam mode toggle ---------- */
        .mode-wrap { background: var(--paper-warm); border: 1px solid var(--line); border-radius: 14px; padding: 12px; margin: 14px 0 4px 0; }
        .mode-wrap .mode-title { font-family: var(--font-display); font-size: 0.64rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); display: block; margin-bottom: 8px; }
        .mode-row { display: flex; gap: 8px; }
        .mode-chip { position: relative; flex: 1; font-family: var(--font-display); font-size: 0.82rem; font-weight: 800; padding: 13px 8px 12px; border-radius: 12px; border: 1.5px solid var(--line-strong); background: #fff; color: var(--text-secondary); cursor: pointer; transition: all 0.2s var(--glide); text-align: center; }
        .mode-chip .mc-sub { display: block; font-size: 0.64rem; font-weight: 600; color: var(--text-muted); margin-top: 3px; text-transform: none; letter-spacing: 0; }
        .mode-chip .mc-dot { display: inline-block; width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid var(--line-strong); background: #fff; vertical-align: -2px; margin-right: 6px; transition: all 0.2s var(--glide); }
        .mode-chip.sel { background: var(--brand-orange); border-color: var(--brand-orange-deep); color: #fff; box-shadow: 0 8px 20px -10px rgba(240,146,59,0.7); }
        .mode-chip.sel .mc-sub { color: rgba(255,255,255,0.9); }
        .mode-chip.sel .mc-dot { background: #fff; border-color: #fff; box-shadow: inset 0 0 0 3px var(--brand-orange); }
        .redraw-btn:hover { border-color: var(--brand-orange); color: var(--brand-orange-deep); }

        .attempt-strip { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .attempt-chip { font-family: var(--font-display); font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); background: var(--paper-warm); border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px; animation: zoomFocus 0.5s var(--glide) both; }
        .attempt-chip b { color: var(--brand-orange-deep); }

        /* ---------- Drills ---------- */
        .drill-progress { display: flex; justify-content: center; gap: 6px; margin-bottom: 14px; }
        .drill-progress i { width: 26px; height: 5px; border-radius: 99px; background: var(--line); transition: all 0.3s var(--spring); }
        .drill-progress i.done { background: var(--color-success); }
        .drill-progress i.cur { background: var(--brand-orange); transform: scaleY(1.4); }
        .drill-banner { text-align: center; font-family: var(--font-serif); font-size: 1.15rem; font-weight: 700; color: var(--color-success); padding: 14px 0 4px 0; animation: zoomFocus 0.6s var(--glide) both; }

        .type-chip { display: inline-block; font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #fff; background: var(--brand-black); border-radius: 7px; padding: 4px 9px; margin-left: 8px; vertical-align: middle; }

        /* ---------- Type gallery accordion ---------- */
        .qtype-row { background: #ffffff; border: 1px solid var(--line); border-radius: 12px; margin-bottom: 8px; overflow: hidden; animation: zoomFocus 0.6s var(--glide) both; }
        .qtype-head { display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; font-family: var(--font-display); font-size: 0.9rem; font-weight: 700; transition: background 0.2s ease; }
        .qtype-head:hover { background: var(--brand-orange-wash); }
        .qtype-head .qt-cue { margin-left: auto; font-size: 0.68rem; font-weight: 600; color: var(--text-muted); font-style: italic; text-align: right; max-width: 45%; }
        .qtype-head .qt-chev { color: var(--brand-orange); font-weight: 800; transition: transform 0.25s var(--spring); }
        .qtype-row.open .qt-chev { transform: rotate(90deg); }
        .qtype-body { display: none; padding: 0 16px 14px 16px; font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; text-align: left; border-top: 1px dashed var(--line); }
        .qtype-row.open .qtype-body { display: block; animation: zoomFocus 0.4s var(--glide) both; }
        .qtype-body .qt-labels { font-family: var(--font-note); font-size: 1.3rem; color: var(--note-ink); background: var(--note-bg); border: 1px solid var(--note-border); border-radius: 10px; padding: 8px 14px; margin-top: 8px; }

        /* ---------- Segmented navigation ---------- */
        .seg-tab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px; padding: 11px 4px 13px 4px; border: none; border-bottom: 3px solid transparent; background: transparent; cursor: pointer; transition: all 0.3s var(--glide); margin-bottom: -1px; }
        .seg-tab .st-ico { opacity: 0.5; transition: opacity 0.3s ease, color 0.3s ease; color: var(--text-muted); display: flex; }
        .seg-tab .st-ico svg { width: 15px; height: 15px; display: block; }
        .seg-tab.active .st-ico { color: var(--brand-orange); }
        .seg-tab .st-label { font-family: var(--font-display); font-size: 0.78rem; font-weight: 700; color: var(--text-muted); transition: color 0.3s ease; }
        .seg-tab .st-meta { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; color: var(--text-muted); background: var(--paper-warm); border: 1px solid var(--line); border-radius: 7px; padding: 2px 7px; }
        .seg-tab:hover .st-label { color: var(--brand-orange-deep); }
        .seg-tab.active { border-bottom-color: var(--brand-black); }
        .seg-tab.active .st-ico { opacity: 1; }
        .seg-tab.active .st-label { color: var(--brand-black); }
        .seg-tab.active .st-meta { color: var(--brand-orange-deep); border-color: rgba(240,146,59,0.4); background: var(--brand-orange-wash); }

        /* ---------- Progress report ---------- */
        .prog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .prog-ch { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 12px 8px; text-align: center; animation: zoomFocus 0.6s var(--glide) both; }
        .prog-ch .pc-num { font-family: var(--font-serif); font-size: 1rem; font-weight: 700; color: var(--line-strong); display: block; }
        .prog-ch .pc-name { font-family: var(--font-display); font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); display: block; margin-top: 2px; }
        .prog-ch.done { border-color: rgba(29,122,63,0.35); background: var(--color-success-light); }
        .prog-ch.done .pc-num { color: var(--color-success); }
        .prog-ch.done .pc-name { color: var(--color-success); }
        .prog-ch.started .pc-num { color: var(--brand-orange); }

        .stat-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .stat-card { flex: 1; background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 13px 8px; text-align: center; animation: zoomFocus 0.6s var(--glide) both; }
        .stat-card .sc-val { font-family: var(--font-serif); font-size: 1.35rem; font-weight: 700; color: var(--text-main); display: block; }
        .stat-card .sc-lab { font-family: var(--font-display); font-size: 0.56rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); display: block; margin-top: 3px; }

        .spark-wrap { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px 12px 16px; margin-bottom: 12px; animation: zoomFocus 0.6s var(--glide) both; }
        .spark-title { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); display: block; margin-bottom: 10px; }
        .spark { display: flex; align-items: flex-end; gap: 5px; height: 64px; }
        .spark i { flex: 1; background: var(--brand-orange); border-radius: 4px 4px 0 0; min-height: 7px; opacity: 0.85; transition: height 0.5s var(--glide); }
        .spark i.full { background: var(--color-success); }
        .spark-x { display: flex; gap: 5px; margin-top: 5px; }
        .spark-x span { flex: 1; text-align: center; font-family: var(--font-display); font-size: 0.56rem; font-weight: 700; color: var(--text-muted); }

        .reset-link { font-family: var(--font-display); font-size: 0.68rem; font-weight: 700; color: var(--text-muted); background: none; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 0; width: 100%; }
        .reset-link:hover { color: var(--color-error); }

        /* ---------- Splash / opening page ---------- */
        .splash-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; text-align: center; padding: 30px 0 10px 0; }
        .splash-logo { display: flex; align-items: center; gap: 22px; animation: zoomFocus 0.9s var(--glide) both; }
        .splash-square { width: 92px; height: 92px; flex-shrink: 0; filter: drop-shadow(0 14px 26px rgba(240,146,59,0.45)); }
        .splash-name { font-family: var(--font-serif); font-size: 1.9rem; font-weight: 500; color: var(--text-main); text-align: left; line-height: 1.12; letter-spacing: -0.02em; }
        .splash-name b { font-weight: 700; }
        .splash-tagline { display: flex; align-items: center; gap: 8px; margin-top: 22px; font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.22em; color: var(--text-secondary); animation: zoomFocus 0.8s var(--glide) 0.25s both; }
        .splash-tagline .tag-dash { width: 26px; height: 3px; background: var(--brand-orange); border-radius: 2px; }
        .splash-title { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; margin: 44px 0 6px 0; color: var(--text-main); animation: zoomFocus 0.8s var(--glide) 0.45s both; }
        .splash-sub { font-family: var(--font-display); font-size: 0.88rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.3em; color: var(--brand-orange-deep); animation: zoomFocus 0.8s var(--glide) 0.6s both; }
        .splash-desc { font-size: 0.94rem; color: var(--text-secondary); line-height: 1.7; max-width: 320px; margin: 22px auto 0 auto; font-weight: 450; animation: zoomFocus 0.8s var(--glide) 0.75s both; }

        /* ---------- Chapter map ---------- */
        .map-card { display: flex; align-items: center; gap: 14px; background: #ffffff; border: 1px solid var(--line); border-radius: 14px; padding: 15px 18px; margin-bottom: 9px; cursor: pointer; transition: all 0.2s var(--spring); text-align: left; animation: zoomFocus 0.6s var(--glide) both; box-shadow: 0 2px 8px -4px rgba(23,21,18,0.07); }
        .map-card:hover { border-color: var(--brand-orange); transform: translateY(-2px); box-shadow: 0 10px 24px -12px rgba(240,146,59,0.5); }
        .map-card:active { transform: scale(0.99); }
        .map-card .mc-num { font-family: var(--font-serif); font-size: 1.25rem; font-weight: 700; color: var(--line-strong); flex-shrink: 0; width: 34px; transition: color 0.3s ease; }
        .map-card.started .mc-num { color: var(--brand-orange); }
        .map-card.complete .mc-num { color: var(--color-success); }
        .map-card .mc-body { flex-grow: 1; }
        .map-card .mc-name { font-family: var(--font-serif); font-size: 1.02rem; font-weight: 700; color: var(--text-main); display: block; }
        .map-card .mc-desc { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.45; display: block; margin-top: 1px; }
        .map-card .mc-status { font-family: var(--font-display); font-size: 0.64rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); flex-shrink: 0; text-align: right; }
        .map-card.started .mc-status { color: var(--brand-orange-deep); }
        .map-card.complete .mc-status { color: var(--color-success); }

        /* ---------- Create (production) tasks ---------- */
        .mini-editor { width: 100%; height: 76px; background: #ffffff; border: 1.5px solid var(--line-strong); border-radius: 12px; padding: 12px 14px; font-family: var(--font-body); font-size: 0.95rem; font-weight: 500; color: var(--text-main); resize: none; outline: none; transition: all 0.25s ease; margin-top: 4px; line-height: 1.5; }
        .mini-editor:focus { border-color: var(--brand-orange); box-shadow: 0 0 0 3px rgba(240,146,59,0.2); }
        .mini-editor::placeholder { color: var(--text-muted); }

        /* ---------- Scaffolded plan fields (Practise) ---------- */
        .plan-scaffold { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
        .ps-row { background: #fff; border: 1.5px solid var(--line-strong); border-radius: 12px; padding: 10px 13px; transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        .ps-row:focus-within { border-color: var(--brand-orange); box-shadow: 0 0 0 3px rgba(240,146,59,0.15); }
        .ps-label { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; font-family: var(--font-display); font-size: 0.64rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brand-orange-deep); margin-bottom: 4px; }
        .ps-label .ps-hint { font-weight: 600; color: var(--text-muted); text-transform: none; letter-spacing: 0; font-size: 0.7rem; text-align: right; }
        .ps-input { width: 100%; border: none; outline: none; resize: none; font-family: var(--font-body); font-size: 0.92rem; line-height: 1.45; color: var(--text-main); background: transparent; padding: 0; display: block; }
        .ps-input::placeholder { color: var(--text-muted); font-family: var(--font-note); font-size: 1.15rem; }
        .ps-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .ps-label { flex: 1; display: block; margin-bottom: 0; }
        .ps-label .ps-hint { display: inline; text-align: left; margin-left: 4px; }
        .ps-hint-btn { flex-shrink: 0; display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-display); font-size: 0.68rem; font-weight: 700; color: var(--brand-orange-deep); background: var(--brand-orange-wash); border: 1px solid rgba(240,146,59,0.4); border-radius: 999px; padding: 4px 10px; cursor: pointer; transition: all 0.18s var(--spring); }
        .ps-hint-btn:hover { background: var(--brand-orange); color: #fff; border-color: var(--brand-orange); }
        .ps-hint-btn .ico { font-size: 0.8rem; }
        .ps-hint-panel:empty { display: none; }
        .ps-hint-panel { margin-top: 7px; }
        .ps-hint-text { display: flex; gap: 7px; font-size: 0.84rem; line-height: 1.5; color: var(--brand-orange-deep); background: var(--brand-orange-wash); border: 1px solid rgba(240,146,59,0.35); border-radius: 10px; padding: 9px 12px; animation: zoomFocus 0.4s var(--glide) both; }
        .ps-hint-text .ico { color: var(--brand-orange); flex-shrink: 0; margin-top: 1px; }
        .ps-hint-load { display: flex; align-items: center; gap: 7px; font-size: 0.8rem; color: var(--text-muted); padding: 6px 4px; }

        /* ---------- Socratic coach ---------- */
        .coach-panel { background: #ffffff; border: 1px solid var(--line); border-left: 4px solid var(--brand-orange); border-radius: 14px; padding: 14px; margin-top: 10px; animation: zoomFocus 0.6s var(--glide) both; }
        .coach-bubble { border-radius: 12px; padding: 10px 14px; margin-bottom: 8px; font-size: 0.9rem; line-height: 1.55; max-width: 92%; }
        .coach-bubble.cb-coach { background: var(--brand-orange-wash); border: 1px solid rgba(240,146,59,0.3); color: var(--text-main); margin-right: auto; }
        .coach-bubble.cb-student { background: var(--paper-warm); border: 1px solid var(--line); color: var(--text-secondary); margin-left: auto; text-align: right; }
        .coach-input-row { display: flex; gap: 8px; margin-top: 4px; }
        .coach-input { flex: 1; border: 1.5px solid var(--line-strong); border-radius: 10px; padding: 10px 12px; font-family: var(--font-body); font-size: 0.88rem; outline: none; }
        .coach-input:focus { border-color: var(--brand-orange); }
        .coach-send { width: 46px !important; margin-top: 0 !important; padding: 10px 0 !important; flex-shrink: 0; }

        .provider-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .provider-chip { flex: 1; font-family: var(--font-display); font-size: 0.8rem; font-weight: 700; padding: 11px 8px; border-radius: 10px; border: 1.5px solid var(--line-strong); background: #fff; color: var(--text-secondary); cursor: pointer; transition: all 0.2s ease; }
        .provider-chip.sel { border-color: var(--brand-orange); background: var(--brand-orange-wash); color: var(--brand-orange-deep); }

        /* ---------- Peek reference accordion ---------- */
        .peek-section { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 8px; overflow: hidden; background: #fff; }
        .peek-head { display: flex; align-items: center; gap: 10px; padding: 12px 15px; cursor: pointer; font-family: var(--font-display); font-size: 0.88rem; font-weight: 700; }
        .peek-head:hover { background: var(--brand-orange-wash); }
        .peek-head .pk-note { margin-left: auto; font-family: var(--font-note); font-size: 1.15rem; color: #a07a10; font-weight: 700; }
        .peek-head .pk-chev { color: var(--brand-orange); font-weight: 800; transition: transform 0.25s var(--spring); margin-left: 8px; }
        .peek-section.open .pk-chev { transform: rotate(90deg); }
        .peek-body { display: none; padding: 0 15px 13px 15px; font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; text-align: left; border-top: 1px dashed var(--line); }
        .peek-section.open .peek-body { display: block; animation: zoomFocus 0.35s var(--glide) both; }
        .peek-body b { color: var(--text-main); }
        .peek-more { font-family: var(--font-display); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brand-orange-deep); background: none; border: none; cursor: pointer; padding: 8px 0 0 0; }
        .peek-more:hover { text-decoration: underline; }
        .peek-typenote { background: var(--brand-orange-wash); border: 1px solid rgba(240,146,59,0.35); border-radius: 10px; padding: 10px 14px; font-size: 0.8rem; font-weight: 600; color: #8a4d0a; margin-bottom: 10px; }

        .console-editor-box { width: 100%; height: 180px; background: var(--note-bg); border: 1.5px solid var(--note-border); border-radius: 12px; padding: 16px; font-family: var(--font-note); font-size: 1.42rem; font-weight: 600; color: var(--note-ink); resize: none; outline: none; transition: all 0.25s ease; margin-top: 10px; line-height: 1.4; }
        .console-editor-box::placeholder { color: #c0a45c; }
        .console-editor-box:focus { border-color: var(--brand-orange); box-shadow: 0 0 0 3px rgba(240,146,59,0.25); }
        .console-meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.76rem; font-weight: 600; color: var(--text-muted); padding: 7px 2px 0 2px; }

        /* ---------- Clearer plan screen ---------- */
        .plan-prompt { background: #fff; border: 1px solid var(--line); border-left: 4px solid var(--brand-orange); border-radius: 14px; padding: 16px 18px; margin-bottom: 15px; box-shadow: 0 12px 30px -22px rgba(23,21,18,0.25); animation: zoomFocus 0.6s var(--glide) both; }
        .pp-tag { display: flex; align-items: center; gap: 7px; font-family: var(--font-display); font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.09em; color: var(--brand-orange-deep); margin-bottom: 9px; }
        .pp-tag .ico { font-size: 0.95rem; color: var(--brand-orange); }
        .pp-type { margin-left: auto; font-size: 0.56rem; background: var(--brand-orange-wash); color: var(--brand-orange-deep); padding: 3px 9px; border-radius: 999px; }
        .pp-text { font-family: var(--font-serif); font-size: 1.16rem; line-height: 1.5; color: var(--text-main); font-weight: 500; }
        .plan-label { display: block; font-family: var(--font-display); font-size: 0.64rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-muted); margin: 4px 2px 7px; }
        .plan-label .pl-hint { text-transform: none; letter-spacing: 0; font-weight: 600; font-size: 0.72rem; }
        .help-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
        .help-pill { font-family: var(--font-display); font-size: 0.82rem; font-weight: 700; color: var(--brand-orange-deep); background: var(--brand-orange-wash); border: 1.5px solid var(--brand-orange); border-radius: 999px; padding: 10px 17px; cursor: pointer; transition: background 0.2s var(--spring), color 0.2s var(--spring), transform 0.2s var(--spring); animation: helpNudge 3s ease-in-out infinite; }
        .help-pill:hover { background: var(--brand-orange); color: #fff; transform: translateY(-1px); }
        .help-pill:active { transform: scale(0.96); }
        @keyframes helpNudge { 0%, 90%, 100% { box-shadow: 0 0 0 0 rgba(240,146,59,0); } 95% { box-shadow: 0 0 0 5px rgba(240,146,59,0.16); } }

        .peek-btn { font-family: var(--font-display); background: transparent; border: none; color: var(--brand-orange-deep); font-size: 0.76rem; font-weight: 700; cursor: pointer; padding: 4px 0; text-transform: uppercase; letter-spacing: 0.08em; }
        .peek-btn:hover { text-decoration: underline; }
        .peek-backdrop { position: fixed; inset: 0; background: rgba(23,21,18,0.45); z-index: 90; display: none; animation: fadeIn 0.25s ease both; }
        .peek-backdrop.open { display: block; }
        .peek-drawer { position: fixed; left: 50%; transform: translateX(-50%) translateY(110%); bottom: 0; width: 100%; max-width: 470px; background: var(--paper); border-radius: 22px 22px 0 0; padding: 22px 26px 30px 26px; z-index: 100; transition: transform 0.4s var(--glide); box-shadow: 0 -20px 60px -20px rgba(23,21,18,0.4); }
        .peek-drawer.open { transform: translateX(-50%) translateY(0); }
        .peek-drawer .peek-title { font-family: var(--font-serif); font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .peek-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text-muted); }

        .compare-label { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.13em; color: var(--text-muted); display: block; margin: 4px 0 8px 2px; }
        .model-plan-card .mp-plain { font-family: var(--font-body); font-size: 0.72rem; font-weight: 500; text-transform: none; letter-spacing: 0; color: var(--text-muted); }
        .mp-key { display: flex; align-items: flex-start; gap: 7px; margin-top: 10px; padding: 9px 12px; background: var(--paper-warm); border-radius: 10px; font-size: 0.76rem; line-height: 1.45; color: var(--text-secondary); }
        .mp-key .ico { color: var(--brand-orange); flex-shrink: 0; margin-top: 1px; }
        .mp-key b { color: var(--text-main); font-family: var(--font-serif); }
        .model-plan-card { background: #ffffff; border: 1px solid var(--line); border-left: 4px solid var(--brand-orange); border-radius: 12px; padding: 15px 20px; text-align: left; margin-bottom: 10px; animation: zoomFocus 0.8s var(--glide) both; }
        .model-plan-card .note-tag { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--brand-orange-deep); display: inline-flex; align-items: center; gap: 6px; margin-bottom: 2px; }
        .model-plan-card .note-tag .ico { font-size: 0.9rem; color: var(--brand-orange); }
        .model-plan-card .note-line { font-family: var(--font-note); font-size: 1.5rem; font-weight: 700; color: var(--text-main); line-height: 1.32; }
        .model-plan-card .note-line + .note-tag { margin-top: 9px; }

        .ai-feedback-btn { font-family: var(--font-display); background: var(--brand-black); color: #fff; border: none; border-radius: 12px; padding: 15px 16px; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.2s var(--spring); width: 100%; margin-top: 12px; letter-spacing: 0.02em; position: relative; overflow: hidden; }
        .ai-feedback-btn:hover:not(:disabled) { background: #000; transform: translateY(-1px); box-shadow: 0 10px 26px -10px rgba(23,21,18,0.5); }
        .ai-feedback-btn:active:not(:disabled) { transform: translateY(1px) scale(0.99); }
        .ai-feedback-btn:disabled { background: var(--line); color: var(--text-muted); cursor: not-allowed; }

        .ai-feedback-panel { background: var(--color-info-light); border: 1px solid var(--line-strong); border-radius: 12px; padding: 18px; text-align: left; font-size: 0.92rem; line-height: 1.68; color: var(--text-main); white-space: pre-wrap; font-weight: 450; margin-top: 12px; animation: zoomFocus 0.7s var(--glide) both; }

        .spinner-dot { display: inline-block; width: 7px; height: 7px; background: var(--brand-orange); border-radius: 50%; margin-right: 4px; animation: pulseSoft 1s infinite ease-in-out; }
        .spinner-dot:nth-child(2) { animation-delay: 0.15s; }
        .spinner-dot:nth-child(3) { animation-delay: 0.3s; }

        .footer-action-cradle { display: flex; gap: 12px; margin-top: auto; padding-top: 16px; align-items: stretch; }
        .footer-back-btn {
            flex-shrink: 0; width: 58px; border-radius: 12px; border: 1.5px solid var(--line-strong);
            background: #fff; color: var(--text-secondary); cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            transition: all 0.2s var(--spring);
        }
        .footer-back-btn svg { width: 22px; height: 22px; }
        .footer-back-btn:hover { border-color: var(--brand-orange); color: var(--brand-orange); transform: translateX(-2px); }
        .footer-back-btn:active { transform: scale(0.94); }
        .tactile-pill-btn {
            font-family: var(--font-display); border: none; border-radius: 12px; cursor: pointer;
            font-weight: 700; font-size: 0.98rem; display: flex; align-items: center; justify-content: center;
            letter-spacing: 0.02em; transition: all 0.2s var(--spring); width: 100%;
            padding: 18px 24px; position: relative; overflow: hidden;
            background: var(--brand-orange); color: #ffffff;
            box-shadow: 0 10px 28px -10px rgba(240,146,59,0.65);
        }
        .tactile-pill-btn::after { content: ""; position: absolute; top: 0; left: -80%; width: 50%; height: 100%; background: linear-gradient(100deg, transparent, rgba(255,255,255,0.35), transparent); animation: shineSweep 3.4s ease-in-out infinite; }
        .tactile-pill-btn:active:not(:disabled) { transform: translateY(2px) scale(0.99); }
        .tactile-pill-btn:hover:not(:disabled) { background: var(--brand-orange-deep); transform: translateY(-1px); box-shadow: 0 14px 32px -10px rgba(240,146,59,0.75); }
        .tactile-pill-btn:disabled { background: var(--line); color: var(--text-muted); transform: none; cursor: not-allowed; box-shadow: none; }
        .tactile-pill-btn:disabled::after { display: none; }

        .phase-toast { position: fixed; top: 26px; left: 50%; transform: translateX(-50%); background: var(--brand-black); color: #fff; font-family: var(--font-display); font-weight: 700; font-size: 0.92rem; padding: 14px 26px; border-radius: 99px; box-shadow: 0 14px 40px -10px rgba(23,21,18,0.5); z-index: 2100; animation: toastPop 2.2s var(--spring) both; pointer-events: none; letter-spacing: 0.02em; }

        .confetti-piece { position: fixed; top: -10px; width: 8px; height: 14px; opacity: 0.95; z-index: 2000; pointer-events: none; animation: confettiFall linear forwards; border-radius: 2px; }

        .btn-ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.45); transform: scale(0); animation: rippleGo 0.6s ease-out forwards; pointer-events: none; }
        .success-ring { position: absolute; left: 50%; top: 50%; width: 22px; height: 22px; margin: -11px 0 0 -11px; border: 2px solid var(--brand-orange); border-radius: 50%; opacity: 0.9; animation: ringExpand 0.7s ease-out forwards; pointer-events: none; }

        .tap-card::before, .home-door::before {
            content: ""; position: absolute; inset: 0; border-radius: inherit; opacity: 0;
            transition: opacity 0.3s ease; pointer-events: none;
            background: radial-gradient(160px circle at var(--mx, 50%) var(--my, 50%), rgba(240,146,59,0.13), transparent 70%);
        }
        .tap-card:hover::before, .home-door:hover::before { opacity: 1; }

        /* ---------- Keyframes ---------- */
        @keyframes cardIntro { 0% { opacity: 0; transform: translateY(16px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes canvasShift { 0% { transform: translateX(16px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes zoomFocus { 0% { opacity: 0; transform: scale(0.82); filter: blur(4px); } 60% { opacity: 1; filter: blur(0.5px); } 100% { opacity: 1; transform: scale(1); filter: blur(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slotFill { 0% { transform: scale(0.95); } 55% { transform: scale(1.02); } 100% { transform: scale(1); } }
        @keyframes iconPop { 0% { opacity: 0; transform: scale(0.4) rotate(-8deg); } 70% { opacity: 1; transform: scale(1.25) rotate(3deg); } 100% { opacity: 1; transform: scale(1) rotate(0deg); } }
        @keyframes stampIn { 0% { opacity: 0; transform: rotate(-3deg) scale(2.2); filter: blur(3px); } 60% { opacity: 1; transform: rotate(-3deg) scale(0.94); filter: blur(0); } 100% { opacity: 1; transform: rotate(-3deg) scale(1); } }
        @keyframes tapRight { 0% { transform: scale(1); } 40% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes shakeQuick { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-5px); } 50% { transform: translateX(5px); } }
        @keyframes pulseNudge { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes clockBreath { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
        @keyframes springIn { 0% { opacity: 0; transform: translateY(12px) scale(0.96); } 65% { opacity: 1; transform: translateY(-2px) scale(1.01); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes pulseSoft { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
        @keyframes shineSweep { 0%, 65% { left: -80%; } 100% { left: 130%; } }
        @keyframes toastPop { 0% { opacity: 0; transform: translateX(-50%) translateY(-20px) scale(0.85); } 15% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.04); } 25% { transform: translateX(-50%) translateY(0) scale(1); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-14px) scale(0.92); } }
        @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(540deg); opacity: 0; } }
        /* circle → square → tick → back: same 6-point polygon count so the tick morphs smoothly */
        @keyframes squareMorph {
            0%   { border-radius: 50%; transform: rotate(0deg);   clip-path: polygon(0% 0%, 50% 0%, 100% 0%, 100% 100%, 50% 100%, 0% 100%); }
            24%  { border-radius: 12%; transform: rotate(180deg); clip-path: polygon(0% 0%, 50% 0%, 100% 0%, 100% 100%, 50% 100%, 0% 100%); }
            40%  { border-radius: 0;   transform: rotate(360deg); clip-path: polygon(6% 56%, 21% 41%, 38% 62%, 80% 12%, 95% 27%, 39% 90%); }
            62%  { border-radius: 0;   transform: rotate(360deg); clip-path: polygon(6% 56%, 21% 41%, 38% 62%, 80% 12%, 95% 27%, 39% 90%); }
            80%  { border-radius: 12%; transform: rotate(360deg); clip-path: polygon(0% 0%, 50% 0%, 100% 0%, 100% 100%, 50% 100%, 0% 100%); }
            100% { border-radius: 50%; transform: rotate(360deg); clip-path: polygon(0% 0%, 50% 0%, 100% 0%, 100% 100%, 50% 100%, 0% 100%); }
        }
        @keyframes rippleGo { to { transform: scale(3.2); opacity: 0; } }
        @keyframes ringExpand { to { transform: scale(6); opacity: 0; } }
        /* On phones the card fills the whole screen - no border around it.
           (Kept last in the stylesheet so it wins over the base rules above.) */
        @media (max-width: 520px) {
            body { padding: 0; }
            .app-container { padding: 0; max-width: none; }
            .workspace-card { border-radius: 0; min-height: 100vh; min-height: 100dvh; padding-top: env(safe-area-inset-top); padding-bottom: calc(32px + env(safe-area-inset-bottom)); box-shadow: none; }
        }

        /* ---------- Desktop / wide screens: use the space, keep it calm ---------- */
        @media (min-width: 860px) {
            body { padding: 34px 0 60px 0; }
            .app-container { max-width: 900px; }
            .workspace-card { padding: 0 60px 44px 60px; }
            /* The two home cards sit side by side */
            .home-doors-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: stretch; }
            .home-doors-grid .home-door { margin-bottom: 0; display: flex; flex-direction: column; }
            .home-doors-grid .home-door p { flex: 1; }
            /* Five plan fields: two columns, with P1/P2 free to sit together */
            .plan-scaffold { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
            .plan-scaffold .ps-row:nth-child(1) { grid-column: 1 / -1; }
            .plan-scaffold .ps-row:nth-child(4) { grid-column: 1 / -1; }
            .plan-scaffold .ps-row:nth-child(5) { grid-column: 1 / -1; }
            /* Planning-is-bought-time bars side by side again on wide screens */
            .vs-row { flex-direction: row; }
            /* Compare screen: student plan and model plan side by side */
            .compare-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
            /* Draw-screen type chips get more room */
            .tf-grid { grid-template-columns: repeat(6, 1fr); }
        }
    </style>
</head>
